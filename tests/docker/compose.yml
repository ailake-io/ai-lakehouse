# Phase 2 integration test services
# Usage: docker compose -f tests/docker/compose.yml up -d
services:
  minio:
    image: minio/minio:latest
    container_name: ailake-minio
    command: server /data --console-address ":9001"
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 5s
      timeout: 5s
      retries: 5

  minio-init:
    image: minio/mc:latest
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
        mc alias set local http://minio:9000 minioadmin minioadmin;
        mc mb local/test-bucket --ignore-existing;
        exit 0;
      "

  nessie:
    image: projectnessie/nessie:latest
    container_name: ailake-nessie
    ports:
      - "19120:19120"
    environment:
      QUARKUS_HTTP_PORT: 19120

  localstack:
    image: localstack/localstack:latest
    container_name: ailake-localstack
    ports:
      - "4566:4566"
    environment:
      SERVICES: glue,s3
      AWS_DEFAULT_REGION: us-east-1
      AWS_ACCESS_KEY_ID: test
      AWS_SECRET_ACCESS_KEY: test
