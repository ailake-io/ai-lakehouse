# AI-Lake onboarding demo — single-command environment
#
# Usage (from repo root):
#
#   Basic demo (notebooks 01-03 + 07-13, vector search + Iceberg compat + DuckDB + Spark + multimodal
#   + DuckLake catalog):
#     docker compose -f tests/docker/compose-demo.yml up -d
#
#   Full demo with engine plugins (notebooks 04-05, adds Trino + BigQuery emulator):
#     docker compose -f tests/docker/compose-demo.yml --profile engines up -d
#
#   Airflow demo (notebook 12, Apache Airflow 2.9 + AI-Lake provider):
#     docker compose -f tests/docker/compose-demo.yml --profile airflow up -d
#
#   Flink demo (notebook 14, ailake Flink connector — search/search_full/FTS/write):
#     docker compose -f tests/docker/compose-demo.yml --profile flink up -d
#
# Then open: http://localhost:8888
#
# Services (always-on):
#   minio    — local S3 (console: http://localhost:9001, user/pass: minioadmin)
#   nessie   — Iceberg REST catalog (http://localhost:19120)
#   jupyter  — JupyterLab with ailake + pyiceberg pre-loaded and demo data ready
#
# Services (--profile engines):
#   trino           — Trino 430 (pinned to match trino-plugin's compileOnly SPI version —
#                     see Dockerfile.trino) with the stock Iceberg/Nessie connector
#                     *and* the real ailake Trino plugin (ailake_native catalog).
#                     http://localhost:8080
#   bigquery-emulator — goccy BigQuery emulator (http://localhost:19050 on host)
#
# Services (--profile airflow):
#   airflow — Apache Airflow 2.9 standalone (http://localhost:8090, admin/admin)
#             Uses SequentialExecutor + SQLite — demo-only, not for production.
#
# Services (--profile flink):
#   flink — Flink 1.18.1 standalone session cluster (single container, JobManager +
#           TaskManager) with the real ailake connector pre-installed.
#           Web UI: http://localhost:8082 (mapped from the container's 8081).
#
# First run builds the ailake-py wheel via maturin plus the ailake-cli binary
# (with catalog-ducklake, for notebook 13 — pulls duckdb's bundled C++ build,
# ~8-12 min cold). Subsequent runs are instant (Docker layer cache).

services:

  minio:
    image: minio/minio:latest
    container_name: ailake-demo-minio
    command: server /data --console-address ":9001"
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    volumes:
      - minio-data:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 5s
      timeout: 5s
      retries: 10

  minio-init:
    image: minio/mc:latest
    container_name: ailake-demo-minio-init
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
        mc alias set local http://minio:9000 minioadmin minioadmin;
        mc mb local/demo-bucket --ignore-existing;
        echo 'MinIO bucket ready.';
      "

  nessie:
    image: projectnessie/nessie:latest
    container_name: ailake-demo-nessie
    ports:
      - "19120:19120"
    environment:
      QUARKUS_HTTP_PORT: 19120
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:19120/api/v1/config || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 12

  jupyter:
    build:
      # Context is the repo root so maturin can build the full Rust workspace.
      context: ../..
      dockerfile: tests/docker/demo/Dockerfile
    container_name: ailake-demo-jupyter
    ports:
      - "8888:8888"
    volumes:
      - demo-data:/data
      # Bind-mount notebooks from repo so new/edited notebooks appear without
      # rebuilding the image (overrides the COPY baked into the Dockerfile).
      - ./demo/notebooks:/notebooks:ro
    environment:
      MINIO_ENDPOINT: "http://minio:9000"
      MINIO_ACCESS_KEY: minioadmin
      MINIO_SECRET_KEY: minioadmin
      NESSIE_URI: "http://nessie:19120/api/v1"
      DEMO_TABLE_PATH: /data/ailake_demo
      DEMO_MULTIMODAL_PATH: /data/ailake_multimodal
      DEMO_AGENT_PATH: /data/ailake_agent
      DEMO_FTS_PATH: /data/ailake_fts
      DEMO_DUCKLAKE_STORE: /data/ailake_ducklake
      AILAKE_HOOKS_DELETE_PATH: /data/ailake_hooks_delete_demo
      AILAKE_HOOKS_EVOLVE_PATH: /data/ailake_hooks_evolve_demo
      DEMO_DIM: "32"
      # Engine endpoints — consumed by notebooks 04/05 when engines profile is active.
      # Values match container names so they also work without the profile
      # (notebooks show a clear error if the services are not running).
      TRINO_HOST: trino
      TRINO_PORT: "8080"
      BQ_EMULATOR_HOST: bigquery-emulator
      BQ_EMULATOR_PORT: "9050"
      BQ_PROJECT: ailake-demo
      # Flink endpoint — consumed by notebook 14 when --profile flink is active.
      FLINK_HOST: flink
      FLINK_PORT: "8081"
      # Airflow endpoint — consumed by notebook 12 when --profile airflow is active.
      # Ignored silently when Airflow is not running.
      AIRFLOW_URL: "http://ailake-demo-airflow:8080"
      AIRFLOW_USER: admin
      AIRFLOW_PASSWORD: admin
    depends_on:
      minio-init:
        condition: service_completed_successfully
      nessie:
        condition: service_healthy

  # ── Engine services (--profile engines) ────────────────────────────────────

  trino:
    profiles: ["engines"]
    build:
      # Custom image — bakes in the ailake Trino plugin (ailake_native catalog,
      # notebook 04_trino.ipynb §Fase 11-12 sections) alongside the stock
      # Iceberg/Nessie connector this service already used. Pinned to Trino 430
      # (not 460) — see Dockerfile.trino header for why.
      context: ../..
      dockerfile: tests/docker/demo/Dockerfile.trino
    container_name: ailake-demo-trino
    ports:
      - "8080:8080"
    volumes:
      - ./demo/trino-catalog:/etc/trino/catalog:ro
      # AI-Lake Parquet files at the same path jupyter writes them
      - demo-data:/data
      # Trino var/ dir overlays the same /data mount so Trino user can write
      # to /data/trino without conflicting with the demo-data content
      - trino-var:/data/trino
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8080/v1/info | grep -q '\"starting\":false'"]
      interval: 10s
      timeout: 5s
      retries: 18

  bigquery-emulator:
    profiles: ["engines"]
    image: ghcr.io/goccy/bigquery-emulator:0.6.6
    container_name: ailake-demo-bq
    ports:
      # Host port 19050 avoids collision with the Tor SOCKS proxy default (9050).
      - "19050:9050"
    command:
      - "--project=ailake-demo"
      - "--port=9050"
    healthcheck:
      # curl and wget are absent in this image; use bash /dev/tcp for TCP check.
      test: ["CMD-SHELL", "bash -c 'echo > /dev/tcp/localhost/9050'"]
      interval: 5s
      timeout: 3s
      retries: 12

  # ── Airflow service (--profile airflow) ────────────────────────────────────
  #
  # Runs Apache Airflow 2.9 in single-node mode (SequentialExecutor + SQLite).
  # The same ailake-py wheel built for the jupyter service is embedded in this
  # image — DAGs call `import ailake` directly via PythonOperator.
  #
  # UI:       http://localhost:8090  (user: admin / pass: admin)
  # REST API: http://localhost:8090/api/v1/
  # DAGs dir: tests/docker/demo/dags/ (hot-reloaded, read-only mount)
  #
  # First run builds a separate Airflow image (~5-8 min, cached after).
  # Start with:
  #   docker compose -f tests/docker/compose-demo.yml --profile airflow up -d

  airflow:
    profiles: ["airflow"]
    build:
      context: ../..
      dockerfile: tests/docker/demo/Dockerfile.airflow
    container_name: ailake-demo-airflow
    command: bash /opt/ailake/airflow-entrypoint.sh
    environment:
      AIRFLOW__CORE__LOAD_EXAMPLES: "False"
      AIRFLOW__CORE__EXECUTOR: SequentialExecutor
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: "sqlite:////opt/airflow/airflow.db"
      AIRFLOW__API__AUTH_BACKENDS: "airflow.api.auth.backend.basic_auth"
      AIRFLOW__WEBSERVER__SECRET_KEY: "ailake-demo-secret-do-not-use-in-prod"
      AIRFLOW__SCHEDULER__DAG_DIR_LIST_INTERVAL: "10"
      AILAKE_TABLE_PATH: /data/ailake_airflow
      AILAKE_RAG_TABLE_PATH: /data/ailake_rag_airflow
      AILAKE_HOOKS_DELETE_PATH: /data/ailake_hooks_delete_demo
      AILAKE_HOOKS_EVOLVE_PATH: /data/ailake_hooks_evolve_demo
      DEMO_DIM: "32"
    volumes:
      - ./demo/dags:/opt/airflow/dags:ro
      - ./demo/airflow-entrypoint.sh:/opt/ailake/airflow-entrypoint.sh:ro
      - demo-data:/data
      - airflow-db:/opt/airflow
    ports:
      - "8090:8080"
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:8080/health"]
      interval: 15s
      timeout: 10s
      retries: 16
    depends_on:
      minio-init:
        condition: service_completed_successfully

  # ── Flink service (--profile flink) ─────────────────────────────────────────
  #
  # Single-container standalone session cluster (JobManager + TaskManager in one
  # process) with the ailake connector pre-installed. Not a real multi-node
  # deployment — matches the scale of every other engine service in this demo.
  #
  # Query vectors/text are passed as Flink *job parameters*
  # (`-Dpipeline.global-job-parameters.ailake.query.vector=...`), not SQL —
  # there's no interactive session-property mechanism like Trino's `SET SESSION`.
  # 14_flink.ipynb drives the bundled `sql-client.sh` via `docker exec` for
  # exactly this reason (a Python driver would need its own gateway/job
  # submission client, not just a DB-API connection).

  flink:
    profiles: ["flink"]
    build:
      context: ../..
      dockerfile: tests/docker/demo/Dockerfile.flink
    container_name: ailake-demo-flink
    command: ["/bin/bash", "-c", "/opt/flink/bin/start-cluster.sh && tail -f /opt/flink/log/*.log"]
    ports:
      - "8082:8081"
    volumes:
      - demo-data:/data
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8081/overview"]
      interval: 10s
      timeout: 5s
      retries: 18
    depends_on:
      minio-init:
        condition: service_completed_successfully

  # ── GPU service (--profile gpu) ─────────────────────────────────────────────
  #
  # Requirements on the host:
  #   - NVIDIA GPU + driver ≥ 525 (CUDA 12 compatible)
  #   - NVIDIA Container Toolkit: https://docs.nvidia.com/datacenter/cloud-native/container-toolkit/
  #     apt install -y nvidia-container-toolkit && systemctl restart docker
  #
  # Usage:
  #   docker compose -f tests/docker/compose-demo.yml --profile gpu up -d
  #   open http://localhost:8889   (different host port to avoid collision with cpu jupyter)
  #
  # The GPU variant uses the same image as the CPU jupyter service.
  # ailake detects the GPU at runtime via libloading (no recompile needed).
  # Notebook 10_gpu_demo.ipynb is pre-loaded and starts with hardware_info().

  jupyter-gpu:
    profiles: ["gpu"]
    build:
      context: ../..
      dockerfile: tests/docker/demo/Dockerfile
    container_name: ailake-demo-jupyter-gpu
    ports:
      - "8889:8888"
    volumes:
      - demo-data:/data
      - ./demo/notebooks:/notebooks:ro
    environment:
      MINIO_ENDPOINT: "http://minio:9000"
      MINIO_ACCESS_KEY: minioadmin
      MINIO_SECRET_KEY: minioadmin
      NESSIE_URI: "http://nessie:19120/api/v1"
      DEMO_TABLE_PATH: /data/ailake_demo
      DEMO_MULTIMODAL_PATH: /data/ailake_multimodal
      DEMO_AGENT_PATH: /data/ailake_agent
      DEMO_FTS_PATH: /data/ailake_fts
      DEMO_DUCKLAKE_STORE: /data/ailake_ducklake
      DEMO_DIM: "32"
      TRINO_HOST: trino
      TRINO_PORT: "8080"
      BQ_EMULATOR_HOST: bigquery-emulator
      BQ_EMULATOR_PORT: "9050"
      BQ_PROJECT: ailake-demo
      # Hint to notebooks that GPU is expected on this service variant.
      AILAKE_GPU_DEMO: "1"
    depends_on:
      minio-init:
        condition: service_completed_successfully
      nessie:
        condition: service_healthy
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]

volumes:
  minio-data:
  demo-data:
  trino-var:
  airflow-db:
