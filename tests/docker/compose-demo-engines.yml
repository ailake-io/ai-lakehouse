# AI-Lake engine demo overlay — adds Trino + BigQuery emulator to the base demo stack.
#
# Usage (from repo root, together with the base compose):
#   docker compose \
#     -f tests/docker/compose-demo.yml \
#     -f tests/docker/compose-demo-engines.yml \
#     up -d
#
# Then open http://localhost:8888 and run the engine notebooks:
#   04_trino.ipynb       — SQL via Trino + Iceberg HadoopCatalog
#   05_bigquery.ipynb    — SQL via BigQuery emulator (streaming inserts)
#
# Notes:
#   - Trino mounts the shared demo-data volume so it can read the same
#     AI-Lake Parquet files written by init_demo.py (file:///data/ailake_demo).
#   - Spark notebooks (03_spark.ipynb) use PySpark local[*] mode inside
#     the Jupyter container — no separate Spark service is required.
#   - The demo-data volume is defined in compose-demo.yml; both files share
#     the same project namespace so the volume is accessible here.

services:

  trino:
    image: trinodb/trino:446
    container_name: ailake-demo-trino
    ports:
      - "8080:8080"
    volumes:
      # Trino catalog pointing to the local ailake_demo warehouse
      - ./demo/trino-catalog:/etc/trino/catalog:ro
      # Shared data volume so Trino can read file:///data/ailake_demo
      - demo-data:/data:ro
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8080/v1/info | grep -q '\"starting\":false'"]
      interval: 10s
      timeout: 5s
      retries: 18

  bigquery-emulator:
    image: ghcr.io/goccy/bigquery-emulator:0.6.6
    container_name: ailake-demo-bq
    ports:
      - "9050:9050"
    command:
      - "--project=ailake-demo"
      - "--port=9050"
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:9050/ || exit 1"]
      interval: 5s
      timeout: 3s
      retries: 12

  # Inject engine endpoints into the Jupyter environment so notebooks can
  # discover services without hard-coding container names.
  jupyter:
    environment:
      TRINO_HOST: trino
      TRINO_PORT: "8080"
      BQ_EMULATOR_HOST: bigquery-emulator
      BQ_EMULATOR_PORT: "9050"
      BQ_PROJECT: ailake-demo
    depends_on:
      trino:
        condition: service_healthy
      bigquery-emulator:
        condition: service_healthy

volumes:
  demo-data:
    external: true
