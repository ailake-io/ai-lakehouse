# ailake Trino plugin catalog (io.ailake.trino.VectorScanConnectorFactory) —
# distinct from the stock Iceberg/Nessie "ailake" catalog in ailake.properties.
# Exposes ailake_native.default.{search,search_full,search_multimodal,ingest}
# as native SQL table functions backed by libailake_jni.so — no Iceberg
# connector involved. See trino-plugin/README.md and 04_trino.ipynb.
#
# ailake.table-name MUST be "table" — every AI-Lake table written via
# ailake-py/CLI uses the fixed Iceberg ident ("default","table"); the
# connector's own default (last path segment of ailake.table-uri) would
# resolve to "ailake_demo" here, which doesn't exist on disk and breaks
# every query. Found the hard way wiring this file for the first time.
connector.name=ailake
ailake.table-uri=/data/ailake_demo
ailake.namespace=default
ailake.table-name=table
ailake.vector-column=embedding
ailake.vector-dim=32
ailake.metric=cosine
