# Iceberg Nessie catalog for the AI-Lake demo table.
# Trino 400+ removed hadoop catalog type; use Nessie (already in the stack).
# init_demo.py registers the table in Nessie after ailake writes the files.
# The demo-data Docker volume is mounted at /data in the Trino container.
#
# Query example:
#   SELECT text, length(embedding) AS emb_bytes
#   FROM ailake.default.table
#   LIMIT 10;
connector.name=iceberg
iceberg.catalog.type=nessie
iceberg.nessie-catalog.uri=http://nessie:19120/api/v1
iceberg.nessie-catalog.ref=main
iceberg.nessie-catalog.default-warehouse-dir=file:///data/ailake_demo
