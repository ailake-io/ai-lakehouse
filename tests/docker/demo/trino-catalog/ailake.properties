# Iceberg HadoopCatalog pointing at the AI-Lake demo table written by init_demo.py.
# The demo-data Docker volume is mounted at /data in the Trino container.
#
# Query example:
#   SELECT text, length(embedding) AS emb_bytes
#   FROM ailake.default.table
#   LIMIT 10;
connector.name=iceberg
iceberg.catalog.type=hadoop
iceberg.catalog.warehouse=file:///data/ailake_demo
