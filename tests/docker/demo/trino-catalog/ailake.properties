# Iceberg Nessie catalog for the AI-Lake demo table.
#
# NOTE: "hadoop catalog type" below refers to Trino's *own* Iceberg-connector
# catalog type (iceberg.catalog.type=hadoop), which Trino 400+ removed — a
# Trino-side constraint, unrelated to AI-Lake's own HadoopCatalog Rust struct
# (ailake-catalog/, the default AI-Lake catalog backend, see CLAUDE.md §DuckLake
# catalog / Fase entries). This file configures Trino's stock Iceberg connector
# against Nessie; it does not touch AI-Lake's catalog code at all.
# Trino 400+ removed its own hadoop catalog type; use Nessie (already in the stack).
# init_demo.py registers the table in Nessie after ailake writes the files.
# The demo-data Docker volume is mounted at /data in the Trino container.
#
# Query example:
#   SELECT text, length(embedding) AS emb_bytes
#   FROM ailake.default.table
#   LIMIT 10;
connector.name=iceberg
iceberg.catalog.type=nessie
iceberg.nessie-catalog.uri=http://nessie:19120/api/v1
iceberg.nessie-catalog.ref=main
iceberg.nessie-catalog.default-warehouse-dir=file:///data/ailake_demo
