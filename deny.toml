[graph]
targets = []

# ---------------------------------------------------------------------------
# License policy — only permissive licenses compatible with MIT OR Apache-2.0.
# Viral licenses (GPL/LGPL/AGPL) would force derivative works to open-source,
# blocking enterprise adoption.
# ---------------------------------------------------------------------------
[licenses]
version = 2
allow = [
    "MIT",
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "ISC",
    "Unicode-3.0",
    "CC0-1.0",
    "Zlib",
    # Permissive / OSI-approved; pulled in by transitive deps
    "0BSD",           # mock_instant (via lancedb, bench-only optional dep)
    "BSL-1.0",        # xxhash-rust (via lancedb)
    # Permissive data license; webpki-roots 1.x (via hyper-rustls / reqwest)
    "CDLA-Permissive-2.0",
]
exceptions = []

# ---------------------------------------------------------------------------
# Duplicate crate bans
# ---------------------------------------------------------------------------
[bans]
multiple-versions = "warn"
wildcards = "allow"
highlight = "all"

# ---------------------------------------------------------------------------
# Security advisories
# ---------------------------------------------------------------------------
[advisories]
version = 2
db-path = "~/.cargo/advisory-db"
db-urls = ["https://github.com/rustsec/advisory-db"]
yanked = "deny"
ignore = [
    # --- No fix available (transitive deps) ---

    # bincode 1.x (ailake-index direct dep) + 2.x (via lancedb/lindera)
    # Team ceased development; 1.3.3 considered "complete". Migrate to bitcode/postcard later.
    { id = "RUSTSEC-2025-0141", reason = "bincode unmaintained, no drop-in upgrade; tracked for future migration" },

    # paste 1.x — via datafusion/lancedb; no fix available
    { id = "RUSTSEC-2024-0436", reason = "paste unmaintained, transitive via datafusion/lancedb; no fix available upstream" },

    # rustls-pemfile 1.x + 2.x — via sqlx and object_store; no patched version exists
    { id = "RUSTSEC-2025-0134", reason = "rustls-pemfile unmaintained, transitive via sqlx/object_store; no fix available upstream" },

    # rsa — Marvin timing attack, via sqlx-mysql; no fix available upstream
    { id = "RUSTSEC-2023-0071", reason = "rsa Marvin attack, transitive via sqlx-mysql; no upstream fix available" },

    # rustls-webpki 0.101.7 — 3 CVEs, all via sqlx 0.7's old rustls; resolved by sqlx upgrade (tracked below)
    { id = "RUSTSEC-2026-0098", reason = "rustls-webpki URI name constraint bug, transitive via sqlx 0.7; fix: upgrade sqlx to 0.8" },
    { id = "RUSTSEC-2026-0099", reason = "rustls-webpki wildcard name constraint bug, transitive via sqlx 0.7; fix: upgrade sqlx to 0.8" },
    { id = "RUSTSEC-2026-0104", reason = "rustls-webpki CRL panic, transitive via sqlx 0.7; fix: upgrade sqlx to 0.8" },

]

# ---------------------------------------------------------------------------
# Allowed crate registries and git sources
# ---------------------------------------------------------------------------
[sources]
unknown-registry = "deny"
unknown-git = "deny"
allow-registry = ["https://github.com/rust-lang/crates.io-index"]
