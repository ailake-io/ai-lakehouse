[graph]
targets = []

# ---------------------------------------------------------------------------
# License policy — only permissive licenses compatible with MIT OR Apache-2.0.
# Viral licenses (GPL/LGPL/AGPL) would force derivative works to open-source,
# blocking enterprise adoption.
# ---------------------------------------------------------------------------
[licenses]
version = 2
allow = [
    "MIT",
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "ISC",
    "Unicode-3.0",
    "CC0-1.0",
    "Zlib",
]
exceptions = []

# ---------------------------------------------------------------------------
# Duplicate crate bans
# ---------------------------------------------------------------------------
[bans]
multiple-versions = "warn"
wildcards = "allow"
highlight = "all"

# ---------------------------------------------------------------------------
# Security advisories
# ---------------------------------------------------------------------------
[advisories]
version = 2
db-path = "~/.cargo/advisory-db"
db-urls = ["https://github.com/rustsec/advisory-db"]
yanked = "deny"

# ---------------------------------------------------------------------------
# Allowed crate registries and git sources
# ---------------------------------------------------------------------------
[sources]
unknown-registry = "deny"
unknown-git = "deny"
allow-registry = ["https://github.com/rust-lang/crates.io-index"]
