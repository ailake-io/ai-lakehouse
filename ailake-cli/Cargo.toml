[package]
name         = "ailake-cli"
version      = "0.1.0"
edition      = "2021"
description  = "AI-Lake Format — administrative CLI"
license      = "MIT OR Apache-2.0"

[[bin]]
name = "ailake"
path = "src/main.rs"

[dependencies]
ailake-core    = { path = "../ailake-core" }
ailake-store   = { path = "../ailake-store", features = ["store-s3", "store-gcs", "store-azure"] }
ailake-catalog = { path = "../ailake-catalog" }
ailake-query   = { path = "../ailake-query" }
clap           = { workspace = true }
tokio          = { workspace = true }
tracing        = { workspace = true }
tracing-subscriber = { workspace = true }
serde_json     = { workspace = true }
