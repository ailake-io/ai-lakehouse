[package]
name        = "ailake-query"
version     = "0.0.5"
edition     = "2021"
description = "Query planner and executor for AI-Lake — vector search, compaction, ContextAssembler"
license     = "MIT OR Apache-2.0"
repository  = "https://github.com/ThiagoLange/iceberg-ai-deltalakehouse"
keywords    = ["vector-search", "iceberg", "lakehouse", "hnsw", "rag"]
categories  = ["database", "algorithms"]

[dependencies]
ailake-core    = { path = "../ailake-core" }
ailake-file    = { path = "../ailake-file" }
ailake-catalog = { path = "../ailake-catalog" }
ailake-store   = { path = "../ailake-store" }
ailake-index   = { path = "../ailake-index" }
ailake-vec     = { path = "../ailake-vec" }
ailake-parquet = { path = "../ailake-parquet" }
arrow-array    = { workspace = true }
arrow-schema   = { workspace = true }
arrow-select   = { workspace = true }
tokio          = { workspace = true }
bytes          = { workspace = true }
thiserror      = { workspace = true }
rayon          = { workspace = true }

[dev-dependencies]
tempfile    = { workspace = true }
rand        = { workspace = true }

[[example]]
name = "demo"

[[example]]
name = "write_fixture"
