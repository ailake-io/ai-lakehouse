name: Bug Report
description: Something is broken or behaving incorrectly
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Please fill out all sections. Incomplete reports may be closed without action.

  - type: input
    id: version
    attributes:
      label: Version
      description: Output of `ailake --version` or the crate version from `Cargo.toml`
      placeholder: "0.0.5"
    validations:
      required: true

  - type: input
    id: rust_version
    attributes:
      label: Rust version
      description: Output of `rustc --version`
      placeholder: "rustc 1.78.0 (9b00956e5 2024-04-29)"
    validations:
      required: true

  - type: input
    id: engine_versions
    attributes:
      label: Engine / integration versions (if applicable)
      description: |
        Fill in only the engines involved in the bug. Leave blank if not applicable.
        - Spark: output of `spark-submit --version`
        - Trino: output of `trino --version` or the server version from the UI
        - Flink: output of `flink --version`
        - Python (ailake-py): output of `python --version`
        - Java (JVM plugins): output of `java -version`
      placeholder: "Spark 3.5.1 / Trino 446 / Python 3.11.9 / Java 17.0.11"
    validations:
      required: false

  - type: input
    id: os
    attributes:
      label: OS / Platform
      placeholder: "Ubuntu 22.04 / macOS 14 / Windows 11"
    validations:
      required: true

  - type: textarea
    id: description
    attributes:
      label: What happened?
      description: Clear description of the bug.
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: What did you expect?
    validations:
      required: true

  - type: textarea
    id: reproduce
    attributes:
      label: Minimal reproduction
      description: Smallest code or CLI command that triggers the bug.
      render: rust
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: Error output / logs
      description: |
        Full error message, panic backtrace, or relevant log lines.
        For Rust: set `RUST_BACKTRACE=1` and `RUST_LOG=debug` before reproducing.
        For JVM plugins: include the full stack trace from the Spark/Trino/Flink logs.
        For ailake-py: include the full Python traceback.
      render: text
    validations:
      required: true
