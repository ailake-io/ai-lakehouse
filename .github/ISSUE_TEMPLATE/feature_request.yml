name: Feature Request
description: Propose a new feature or improvement
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        Check open issues first to avoid duplicates.

  - type: textarea
    id: problem
    attributes:
      label: What problem does this solve?
      description: Describe the use case or pain point. Be specific.
    validations:
      required: true

  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: What should the API, CLI, or behavior look like?
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Other approaches you evaluated and why you rejected them.

  - type: dropdown
    id: area
    attributes:
      label: Area
      options:
        - File format / binary layout
        - Vector index (HNSW / IVF-PQ)
        - Iceberg catalog / metadata
        - Object storage (S3 / GCS / Azure)
        - Python bindings (ailake-py)
        - JVM bindings / Spark / Trino / Flink
        - CLI (ailake)
        - Performance / SIMD / GPU
        - Documentation
        - Other
    validations:
      required: true

  - type: checkboxes
    id: contribution
    attributes:
      label: Are you willing to implement this?
      options:
        - label: Yes, I can open a PR
        - label: I can help review a PR
        - label: No, just suggesting
