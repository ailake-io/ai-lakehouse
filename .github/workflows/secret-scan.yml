name: Secret Scan

on:
  workflow_dispatch:
  # Re-enable push + pull_request when the repository goes public:
  # push:
  # pull_request:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  trufflehog:
    name: TruffleHog
    runs-on: [self-hosted, Linux, X64]
    steps:
      - name: Pre-checkout cleanup of root-owned files
        run: |
          docker run --rm -v "$PWD:/work" -w /work alpine sh -c \
            "rm -rf dist dist-raw 2>/dev/null; chown -R $(id -u):$(id -g) . 2>/dev/null; true" || true

      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: TruffleHog OSS
        uses: trufflesecurity/trufflehog@main
        with:
          extra_args: --only-verified
