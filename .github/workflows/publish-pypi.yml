name: Publish Python

on:
  workflow_dispatch:

jobs:
  linux:
    name: Build Linux (${{ matrix.target }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        target: [x86_64, aarch64]
    steps:
      - uses: actions/checkout@v4

      - uses: PyO3/maturin-action@v1
        env:
          PYO3_USE_ABI3_FORWARD_COMPATIBILITY: "1"
          OPENSSL_DIR: /usr
          OPENSSL_LIB_DIR: /usr/lib64
          OPENSSL_INCLUDE_DIR: /usr/include
          OPENSSL_STATIC: "1"
        with:
          target: ${{ matrix.target }}
          manylinux: auto
          rust-toolchain: stable
          before-script-linux: |
            yum install -y openssl-devel openssl-static 2>/dev/null \
              || dnf install -y openssl-devel openssl-static 2>/dev/null \
              || apt-get install -y libssl-dev 2>/dev/null \
              || true
          command: build
          args: --release --out dist --find-interpreter --manifest-path ailake-py/Cargo.toml

      - uses: actions/upload-artifact@v4
        with:
          name: wheels-linux-${{ matrix.target }}
          path: dist

  macos:
    name: Build macOS (${{ matrix.target }})
    runs-on: macos-latest
    strategy:
      matrix:
        target: [x86_64-apple-darwin, aarch64-apple-darwin]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: |
            3.9
            3.10
            3.11
            3.12
            3.13

      - uses: PyO3/maturin-action@v1
        env:
          PYO3_USE_ABI3_FORWARD_COMPATIBILITY: "1"
        with:
          target: ${{ matrix.target }}
          command: build
          args: --release --out dist --find-interpreter --manifest-path ailake-py/Cargo.toml

      - uses: actions/upload-artifact@v4
        with:
          name: wheels-macos-${{ matrix.target }}
          path: dist

  windows:
    name: Build Windows (x86_64)
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: |
            3.9
            3.10
            3.11
            3.12
            3.13

      - uses: PyO3/maturin-action@v1
        env:
          PYO3_USE_ABI3_FORWARD_COMPATIBILITY: "1"
        with:
          target: x86_64
          command: build
          args: --release --out dist --find-interpreter --manifest-path ailake-py/Cargo.toml

      - uses: actions/upload-artifact@v4
        with:
          name: wheels-windows-x86_64
          path: dist

  sdist:
    name: Build sdist
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: PyO3/maturin-action@v1
        with:
          command: sdist
          args: --out dist --manifest-path ailake-py/Cargo.toml

      - uses: actions/upload-artifact@v4
        with:
          name: wheels-sdist
          path: dist

  publish:
    name: Publish to PyPI
    runs-on: ubuntu-latest
    needs: [linux, macos, windows, sdist]
    # TODO: after creating PyPI account, create a "pypi" environment in
    # Settings → Environments with PYPI_API_TOKEN as an environment secret.
    # This adds a manual approval gate before publish runs.
    # environment:
    #   name: pypi
    #   url: https://pypi.org/p/ailake
    steps:
      - uses: actions/download-artifact@v4
        with:
          pattern: wheels-*
          merge-multiple: true
          path: dist

      - uses: PyO3/maturin-action@v1
        env:
          MATURIN_PYPI_TOKEN: ${{ secrets.PYPI_API_TOKEN }}
        with:
          command: upload
          args: --non-interactive --skip-existing dist/*
