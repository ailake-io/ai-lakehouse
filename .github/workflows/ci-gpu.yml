name: CI GPU (ailake-index — Windows CUDA/ROCm)

on:
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  # Runs ailake-index tests on a Windows self-hosted runner that has NVIDIA or
  # AMD GPU drivers installed.  The gpu.rs libloading backend selects CUDA or
  # ROCm at runtime based on whichever driver is present.
  #
  # Runner requirements:
  #   - Windows 10/11 or Windows Server 2019+
  #   - NVIDIA: CUDA Toolkit 11 or 12 installed (cudart64_*.dll + cublas64_*.dll in PATH)
  #   - AMD:    ROCm for Windows installed (amdhip64.dll + hipblas.dll in PATH)
  #   - Rust stable toolchain installed (rustup)
  index-gpu-windows:
    name: index — gpu (Windows)
    runs-on: [self-hosted, Windows, X64]
    steps:
      - uses: actions/checkout@v6

      - name: Locate and configure Rust
        shell: pwsh
        run: |
          # Prefer the actual toolchain binary over the rustup shim.
          # The shim at $USERPROFILE\.cargo\bin\cargo.exe requires rustup in PATH;
          # the toolchain binary works standalone.
          $rustBin = $null

          # 1. Look for real cargo inside .rustup toolchains
          $toolchainCargo = Get-ChildItem `
            "$env:USERPROFILE\.rustup\toolchains\*\bin\cargo.exe", `
            "C:\Users\$env:USERNAME\.rustup\toolchains\*\bin\cargo.exe" `
            -ErrorAction SilentlyContinue | Select-Object -First 1
          if ($toolchainCargo) {
            $rustBin = Split-Path $toolchainCargo.FullName
            Write-Host "Found toolchain cargo: $rustBin"
          }

          # 2. Fallback: shim path (only works if rustup shim resolves correctly)
          if (-not $rustBin) {
            foreach ($c in @("$env:USERPROFILE\.cargo\bin", "C:\Users\$env:USERNAME\.cargo\bin")) {
              if (Test-Path "$c\cargo.exe") { $rustBin = $c; break }
            }
            if ($rustBin) { Write-Host "Found cargo shim: $rustBin" }
          }

          # 3. Already on PATH
          if (-not $rustBin) {
            $r = Get-Command cargo -ErrorAction SilentlyContinue
            if ($r) { $rustBin = Split-Path $r.Source; Write-Host "cargo already on PATH: $rustBin" }
          }

          if (-not $rustBin) {
            Write-Error "cargo not found. Install Rust stable on this runner."
            exit 1
          }

          "$rustBin" | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append

      - uses: Swatinem/rust-cache@v2

      - name: Detect GPU backend
        shell: pwsh
        run: |
          function Find-Dll([string]$name) {
            ($env:PATH -split ';') | ForEach-Object {
              $p = Join-Path $_ $name
              if (Test-Path $p) { $p }
            } | Select-Object -First 1
          }

          $cuda = Find-Dll "cudart64_12.dll"
          if (-not $cuda) { $cuda = Find-Dll "cudart64_11.dll" }
          $rocm = Find-Dll "amdhip64.dll"

          if ($cuda) {
            Write-Host "NVIDIA CUDA runtime found: $cuda"
            $env:AILAKE_GPU_BACKEND = "cuda"
          } elseif ($rocm) {
            Write-Host "AMD ROCm runtime found: $rocm"
            $env:AILAKE_GPU_BACKEND = "rocm"
          } else {
            Write-Host "WARNING: no CUDA or ROCm runtime found — GPU tests will be skipped by libloading fallback"
            Write-Host "Install CUDA Toolkit 11/12 or ROCm for Windows to enable GPU tests on this runner."
            $env:AILAKE_GPU_BACKEND = "none"
          }
          echo "AILAKE_GPU_BACKEND=$env:AILAKE_GPU_BACKEND" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append

      - name: Run ailake-index tests (GPU path)
        shell: pwsh
        run: cargo test -p ailake-index -- --nocapture
