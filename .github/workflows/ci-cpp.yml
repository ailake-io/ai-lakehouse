name: CI C++

on:
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  build:
    name: cmake build (C++17, CPU only)
    runs-on: [self-hosted, Linux, X64]
    steps:
      - uses: actions/checkout@v6

      - uses: jwlawson/actions-setup-cmake@v2
        with:
          cmake-version: '3.28'

      - name: Configure
        run: |
          cmake -S ailake-cpp -B ailake-cpp/build \
            -DCMAKE_BUILD_TYPE=Release \
            -DAILAKE_CUDA=OFF \
            -DAILAKE_TESTS=ON \
            -DAILAKE_EXAMPLES=ON

      - name: Build
        run: cmake --build ailake-cpp/build --parallel

      - name: Test
        run: ctest --test-dir ailake-cpp/build --output-on-failure --parallel
