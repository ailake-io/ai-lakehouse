name: CI DuckDB Extension

on:
  workflow_dispatch:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
  DUCKDB_VERSION: "v1.5.0"
  # DuckDB ≥1.2 pip wheels use the standard linux_amd64 platform tag;
  # gcc4/old-ABI builds were dropped in 1.2. Set explicitly so
  # append_extension_metadata.py uses the right tag at cmake build time.
  DUCKDB_PLATFORM: "linux_amd64"

jobs:
  build-and-test:
    name: build + test (Linux x86_64)
    runs-on: ubuntu-latest
    # ailake-jni is now linked statically into the extension via corrosion, and
    # `cmake --build` builds a real duckdb_static from source at DUCKDB_VERSION
    # instead of headers-only (see duckdb-ailake/README.md "Design") — a from-scratch
    # build of duckdb_static alone takes several minutes; 20 was sized for the old
    # headers-only setup and left this job getting killed mid-build.
    timeout-minutes: 45

    steps:
      - uses: actions/checkout@v6

      - uses: dtolnay/rust-toolchain@stable

      - uses: jwlawson/actions-setup-cmake@v2
        with:
          cmake-version: "3.28"

      # ailake-jni's staticlib is built by corrosion as part of "Build DuckDB
      # extension" below — this cdylib build is only for write_fixture.py,
      # which dlopens libailake_jni.so directly via ctypes (a standalone
      # fixture generator, unrelated to how the extension itself links it).
      - name: Build libailake_jni.so
        run: cargo build --release -p ailake-jni

      # Caches the FetchContent'd DuckDB source/build tree (the expensive part —
      # duckdb_static built from scratch) and corrosion's cargo build output.
      # Keyed on DUCKDB_VERSION + Cargo.lock so a DuckDB bump or ailake-jni
      # dependency change invalidates it instead of silently reusing a stale build.
      # On a full cache hit this makes "Build DuckDB extension" below a no-op.
      - uses: actions/cache@v4
        with:
          path: duckdb-ailake/build
          key: duckdb-ailake-build-${{ runner.os }}-${{ env.DUCKDB_VERSION }}-${{ hashFiles('Cargo.lock', 'ailake-jni/**', 'duckdb-ailake/CMakeLists.txt') }}
          restore-keys: |
            duckdb-ailake-build-${{ runner.os }}-${{ env.DUCKDB_VERSION }}-

      # Belt-and-suspenders for the case above only *partially* hits (e.g. a
      # duckdb-ailake/src/*.cpp change invalidates the whole-dir cache key but
      # duckdb_static's own object files are unaffected): ccache keys per
      # translation unit on compiler+flags+source content, so it still serves
      # cache hits for the untouched bulk of the DuckDB source even when the
      # directory-level cache above misses.
      - uses: hendrikmuhs/ccache-action@v1.2
        with:
          key: duckdb-ailake-ccache-${{ runner.os }}-${{ env.DUCKDB_VERSION }}
          max-size: 2G
          update-package-index: true

      - name: Configure DuckDB extension
        run: |
          cmake -S duckdb-ailake -B duckdb-ailake/build \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_C_COMPILER_LAUNCHER=ccache \
            -DCMAKE_CXX_COMPILER_LAUNCHER=ccache \
            -DDUCKDB_VERSION=${{ env.DUCKDB_VERSION }}

      # Unbounded `--parallel` spawns one compile per vCPU (4 on ubuntu-latest);
      # duckdb_static's unified-build translation units can each peak at 3-4GB
      # RSS, so 4 concurrent compiles push close to the runner's 16GB RAM and
      # trigger heavy swapping. That starves the runner agent's heartbeat to
      # GitHub's server, which then force-kills the whole VM ("shutdown signal",
      # not an OOM-killer message — confirmed via job logs showing no OOM/disk
      # error, just a mass `Terminated` across in-flight compiles at ~5-6min in,
      # varying wildly in build %). Capping at 2 trades some wall-clock for
      # headroom so the job survives to completion instead of getting reclaimed
      # mid-build.
      - name: Build DuckDB extension
        run: cmake --build duckdb-ailake/build --parallel 2

      - name: Verify extension artifact
        run: |
          ls -lh duckdb-ailake/build/ailake.duckdb_extension
          file duckdb-ailake/build/ailake.duckdb_extension

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Python deps
        run: pip install duckdb==$(echo ${{ env.DUCKDB_VERSION }} | tr -d 'v') pyarrow numpy

      - name: Generate write fixture
        run: python tests/fixtures/write_fixture.py ./compat-fixture
        env:
          AILAKE_LIB: target/release/libailake_jni.so

      - name: Run write tests
        run: python duckdb-ailake/test/test_write.py
        env:
          AILAKE_EXT:    duckdb-ailake/build/ailake.duckdb_extension
          AILAKE_TMPDIR: /tmp/ailake_duck_write

      - name: Run search tests
        run: python duckdb-ailake/test/test_search.py
        env:
          AILAKE_EXT:     duckdb-ailake/build/ailake.duckdb_extension
          AILAKE_FIXTURE: ./compat-fixture

      - name: Run scan tests
        run: python duckdb-ailake/test/test_scan.py
        env:
          AILAKE_EXT:     duckdb-ailake/build/ailake.duckdb_extension
          AILAKE_FIXTURE: ./compat-fixture

      - name: Run multimodal search tests
        run: python duckdb-ailake/test/test_multimodal.py
        env:
          AILAKE_EXT:     duckdb-ailake/build/ailake.duckdb_extension
          AILAKE_FIXTURE: ./compat-fixture

      - name: Run delete_where tests
        run: python duckdb-ailake/test/test_delete.py
        env:
          AILAKE_EXT:    duckdb-ailake/build/ailake.duckdb_extension
          AILAKE_TMPDIR: /tmp/ailake_duck_delete

      - name: Run evolve_schema tests
        run: python duckdb-ailake/test/test_evolve.py
        env:
          AILAKE_EXT:    duckdb-ailake/build/ailake.duckdb_extension
          AILAKE_TMPDIR: /tmp/ailake_duck_evolve

      - name: Run write_batch_multi tests
        run: python duckdb-ailake/test/test_write_multi.py
        env:
          AILAKE_EXT:    duckdb-ailake/build/ailake.duckdb_extension
          AILAKE_TMPDIR: /tmp/ailake_duck_write_multi

      - name: Run compact tests
        run: python duckdb-ailake/test/test_compact.py
        env:
          AILAKE_EXT:    duckdb-ailake/build/ailake.duckdb_extension
          AILAKE_TMPDIR: /tmp/ailake_duck_compact

      - name: Run create_table tests
        run: python duckdb-ailake/test/test_create_table.py
        env:
          AILAKE_EXT:    duckdb-ailake/build/ailake.duckdb_extension
          AILAKE_TMPDIR: /tmp/ailake_duck_create_table

      - name: Phase T — Run FTS write tests
        run: python duckdb-ailake/test/test_write.py -k fts
        env:
          AILAKE_EXT:    duckdb-ailake/build/ailake.duckdb_extension
          AILAKE_TMPDIR: /tmp/ailake_duck_fts_write

      - name: Phase T — Run FTS search tests
        run: python duckdb-ailake/test/test_search.py -k fts
        env:
          AILAKE_EXT:     duckdb-ailake/build/ailake.duckdb_extension
          AILAKE_FIXTURE: ./compat-fixture
