name: Publish Airflow Provider

# Manual fallback only. The canonical publish-airflow job lives in release.yml
# (needs: release) where it has direct access to the release job outputs.
# Use this workflow to re-publish the Airflow provider without rerunning the
# full release pipeline.
on:
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag to attach assets to (e.g. v0.1.0). Leave empty to derive from Cargo.toml."
        required: false

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  publish:
    name: Build and publish apache-airflow-providers-ailake to PyPI (manual)
    runs-on: [self-hosted, Linux, X64]
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6

      - name: Resolve tag
        id: meta
        run: |
          VERSION=$(grep '^version' ailake-core/Cargo.toml | head -1 | sed 's/.*"\(.*\)"/\1/')
          TAG="${{ github.event.inputs.tag }}"
          [ -z "$TAG" ] && TAG="v$VERSION"
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"

      - uses: actions/setup-python@v5
        with:
          python-version: "3.9"

      - name: Build wheel and sdist
        run: |
          pip install hatchling
          cd airflow-providers-ailake
          python -m hatchling build --target wheel --target sdist

      - name: Publish to PyPI
        env:
          TWINE_USERNAME: __token__
          TWINE_PASSWORD: ${{ secrets.PYPI_API_TOKEN }}
        run: |
          pip install twine
          twine upload --skip-existing airflow-providers-ailake/dist/*

      - name: Upload wheel to GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release upload "${{ steps.meta.outputs.tag }}" \
            airflow-providers-ailake/dist/*.whl \
            airflow-providers-ailake/dist/*.tar.gz \
            --clobber
