name: Publish Airflow Provider

on:
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  publish:
    name: Build and publish apache-airflow-providers-ailake to PyPI
    runs-on: [self-hosted, Linux, X64]
    permissions:
      contents: write   # needed to upload wheel asset to GitHub Release
    # After creating a PyPI account, create a "pypi" environment in
    # Settings → Environments with PYPI_API_TOKEN as an environment secret.
    # Uncomment below to add a manual approval gate before publish runs.
    # environment:
    #   name: pypi
    #   url: https://pypi.org/p/apache-airflow-providers-ailake
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.9"

      - name: Build wheel and sdist
        run: |
          pip install hatchling
          cd airflow-providers-ailake
          python -m hatchling build --target wheel --target sdist

      - name: Publish to PyPI
        env:
          TWINE_USERNAME: __token__
          TWINE_PASSWORD: ${{ secrets.PYPI_API_TOKEN }}
        run: |
          pip install twine
          twine upload --skip-existing airflow-providers-ailake/dist/*

      - name: Upload wheel to GitHub Release
        run: |
          VERSION=$(grep '^version' ailake-core/Cargo.toml | head -1 | sed 's/.*"\(.*\)"/\1/')
          TAG="v$VERSION"
          gh release upload "$TAG" airflow-providers-ailake/dist/*.whl \
            airflow-providers-ailake/dist/*.tar.gz --clobber 2>/dev/null || \
            echo "Warning: GitHub Release $TAG not found — run the Release workflow first."
        env:
          GH_TOKEN: ${{ github.token }}
