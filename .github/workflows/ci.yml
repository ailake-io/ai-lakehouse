name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  fmt:
    name: fmt
    runs-on: self-hosted
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt
      - run: cargo fmt --all -- --check

  clippy:
    name: clippy
    runs-on: self-hosted
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - uses: Swatinem/rust-cache@v2
      - run: cargo clippy --workspace --all-targets -- -D warnings

  unit:
    name: unit
    runs-on: self-hosted
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - run: cargo test --workspace --lib --bins

  integration:
    name: integration
    runs-on: self-hosted
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - run: cargo test -p ailake-tests -- --test-threads=1

  compat-parquet:
    name: compat-parquet
    runs-on: self-hosted
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - run: cargo test -p ailake-tests --test parquet_trailing_bytes
      - run: cargo test -p ailake-tests --test positional_invariant

  compat-pyarrow:
    name: compat-pyarrow
    runs-on: self-hosted
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Build fixture
        run: cargo run --example write_fixture -p ailake-query
      - name: Install PyArrow
        run: pip install pyarrow --break-system-packages
      - name: Check PyArrow compatibility
        run: python3 tests/compat/check_pyarrow.py ./compat-fixture

  compat-duckdb:
    name: compat-duckdb
    runs-on: self-hosted
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Build fixture
        run: cargo run --example write_fixture -p ailake-query
      - name: Install DuckDB
        run: pip install duckdb --break-system-packages
      - name: Check DuckDB compatibility
        run: python3 tests/compat/check_duckdb.py ./compat-fixture

  compat-pyiceberg:
    name: compat-pyiceberg
    runs-on: self-hosted
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Build fixture
        run: cargo run --example write_fixture -p ailake-query
      - name: Install PyIceberg
        run: pip install "pyiceberg[pyarrow]" --break-system-packages
      - name: Check PyIceberg compatibility
        run: python3 tests/compat/check_pyiceberg.py ./compat-fixture

  compat-ailake-py:
    name: compat-ailake-py
    runs-on: self-hosted
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install maturin
        run: pip install maturin
      - name: Build ailake-py wheel
        run: cd ailake-py && maturin build --release --out dist --interpreter python3.12
      - name: Install ailake wheel
        run: pip install ailake-py/dist/*.whl
      - name: Check ailake Python SDK
        run: python3.12 tests/compat/check_ailake_py.py
