name: Compat Heavy (Spark + Trino + JVM Plugins + BigQuery)

on:
  workflow_dispatch:
    inputs:
      fixture_rows:
        description: "Number of rows in test fixture"
        default: "1000"
        required: false

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  compat-spark:
    name: compat-spark
    runs-on: self-hosted
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Build fixture
        run: cargo run --example write_fixture -p ailake-query

      - name: Set up Python venv
        run: |
          rm -rf /tmp/spark-venv
          python3.12 -m venv /tmp/spark-venv
          /tmp/spark-venv/bin/pip install "pyspark<4.0" pyarrow

      - name: Check Spark Parquet compatibility (direct read)
        run: |
          unset SPARK_HOME
          export PYSPARK_PYTHON=/tmp/spark-venv/bin/python3
          export SPARK_LOCAL_IP=127.0.0.1
          /tmp/spark-venv/bin/python3 - <<'EOF'
          import sys, pathlib
          from pyspark.sql import SparkSession

          fixture_dir = pathlib.Path("./compat-fixture")
          expected = int((fixture_dir / "fixture_rows.txt").read_text().strip())
          parquet_paths = [
              p.strip()
              for p in (fixture_dir / "fixture_files.txt").read_text().splitlines()
              if p.strip()
          ]

          spark = (
              SparkSession.builder
              .appName("ailake-parquet-compat")
              .master("local[2]")
              .config("spark.driver.memory", "1g")
              .config("spark.sql.shuffle.partitions", "2")
              .config("spark.sql.sources.v2.pushAggregation", "false")
              .getOrCreate()
          )
          spark.sparkContext.setLogLevel("ERROR")

          df = spark.read.parquet(*parquet_paths)
          total = df.count()
          assert total == expected, f"FAIL: Spark read {total} rows, expected {expected}"

          cols = df.columns
          assert "id" in cols, f"FAIL: 'id' column missing"
          assert "text" in cols, f"FAIL: 'text' column missing"
          assert "embedding" in cols, f"FAIL: 'embedding' column missing"

          ids = [r[0] for r in df.select("id").collect()]
          id_min, id_max = min(ids), max(ids)
          assert id_min == 0, f"FAIL: min id {id_min} != 0"
          assert id_max == expected - 1, f"FAIL: max id {id_max} != {expected - 1}"

          print(f"PASS (Parquet): Spark read {total} rows, schema={cols}, id=({id_min}, {id_max})")
          spark.stop()
          EOF

      - name: Check Spark + Iceberg HadoopCatalog (SQL query)
        run: |
          unset SPARK_HOME
          export PYSPARK_PYTHON=/tmp/spark-venv/bin/python3
          export SPARK_LOCAL_IP=127.0.0.1
          /tmp/spark-venv/bin/python3 - <<'EOF'
          import sys, os, pathlib
          from pyspark.sql import SparkSession

          fixture_dir = pathlib.Path("./compat-fixture").resolve()
          expected = int((fixture_dir / "fixture_rows.txt").read_text().strip())

          spark = (
              SparkSession.builder
              .appName("ailake-iceberg-compat")
              .master("local[2]")
              .config("spark.driver.memory", "1g")
              .config("spark.sql.shuffle.partitions", "2")
              .config("spark.sql.sources.v2.pushAggregation", "false")
              # Iceberg Spark extension + HadoopCatalog (no HMS needed)
              .config(
                  "spark.jars.packages",
                  "org.apache.iceberg:iceberg-spark-runtime-3.5_2.12:1.5.2",
              )
              .config(
                  "spark.sql.extensions",
                  "org.apache.iceberg.spark.extensions.IcebergSparkSessionExtensions",
              )
              .config("spark.sql.catalog.ailake", "org.apache.iceberg.spark.SparkCatalog")
              .config("spark.sql.catalog.ailake.type", "hadoop")
              .config("spark.sql.catalog.ailake.warehouse", f"file://{fixture_dir}")
              .getOrCreate()
          )
          spark.sparkContext.setLogLevel("ERROR")

          count = spark.sql(
              "SELECT count(*) AS n FROM ailake.default.compat_test"
          ).collect()[0][0]
          assert count == expected, f"FAIL: Iceberg SQL count {count} != {expected}"

          ids = [r[0] for r in spark.sql(
              "SELECT id FROM ailake.default.compat_test"
          ).collect()]
          id_min, id_max = min(ids), max(ids)
          assert id_min == 0, f"FAIL: min id {id_min}"
          assert id_max == expected - 1, f"FAIL: max id {id_max}"

          # Verify schema via Iceberg catalog
          cols = spark.sql(
              "SELECT * FROM ailake.default.compat_test LIMIT 1"
          ).columns
          for c in ("id", "text", "embedding"):
              assert c in cols, f"FAIL: column '{c}' missing from schema {cols}"

          print(
              f"PASS (Iceberg SQL): {count} rows, id={id_min}..{id_max}, schema={cols}"
          )
          spark.stop()
          EOF

  compat-trino:
    name: compat-trino
    runs-on: self-hosted
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2

      - name: Pre-cleanup and prepare Docker resources
        run: |
          docker rm -f iceberg-rest trino 2>/dev/null || true
          docker network rm ailake-net 2>/dev/null || true
          rm -rf /tmp/ailake-fixture /tmp/ailake-trino-catalog
          docker network inspect ailake-net >/dev/null 2>&1 || docker network create ailake-net

      - name: Build fixture
        # Write fixture directly to /tmp/ailake-fixture so absolute paths embedded
        # in Iceberg avro manifests match the path Docker containers will see.
        env:
          COMPAT_FIXTURE_PATH: /tmp/ailake-fixture
        run: cargo run --example write_fixture -p ailake-query

      - name: Start Iceberg REST catalog + Trino
        run: |
          chmod -R 777 /tmp/ailake-fixture
          echo "=== fixture tree ===" && find /tmp/ailake-fixture -maxdepth 4 | sort

          # Mount /tmp/ailake-fixture at the same path inside Docker so that the
          # absolute paths stored in Iceberg avro manifests resolve correctly.
          docker run -d --name iceberg-rest \
            --network ailake-net \
            -p 8181:8181 \
            -v "/tmp/ailake-fixture:/tmp/ailake-fixture" \
            -e CATALOG_WAREHOUSE="/tmp/ailake-fixture" \
            -e CATALOG_CATALOG__IMPL="org.apache.iceberg.hadoop.HadoopCatalog" \
            tabulario/iceberg-rest:0.10.0

          # Trino catalog config pointing to the REST catalog.
          mkdir -p /tmp/ailake-trino-catalog
          cat > /tmp/ailake-trino-catalog/ailake.properties <<'PROPS'
          connector.name=iceberg
          iceberg.catalog.type=rest
          iceberg.rest-catalog.uri=http://iceberg-rest:8181
          PROPS
          chmod -R 755 /tmp/ailake-trino-catalog

          # Trino also needs the fixture mount so it can read parquet files
          # via the absolute paths stored in manifest entries.
          docker run -d --name trino \
            --network ailake-net \
            -p 8080:8080 \
            -v "/tmp/ailake-trino-catalog:/etc/trino/catalog" \
            -v "/tmp/ailake-fixture:/tmp/ailake-fixture" \
            trinodb/trino:436

      - name: Wait for services
        run: |
          echo "Waiting for iceberg-rest..."
          for i in $(seq 1 40); do
            if curl -sf http://localhost:8181/v1/config > /dev/null 2>&1; then
              echo "iceberg-rest ready after $((i * 3))s"
              break
            fi
            sleep 3
          done

          echo "=== REST catalog namespaces ===" && curl -s http://localhost:8181/v1/namespaces || true
          echo "Waiting for Trino..."
          for i in $(seq 1 60); do
            if curl -sf http://localhost:8080/v1/info 2>/dev/null | grep -q '"starting":false'; then
              echo "Trino ready after $((i * 5))s"
              break
            fi
            sleep 5
          done

      - name: Set up Python venv
        run: |
          rm -rf /tmp/trino-venv
          python3 -m venv /tmp/trino-venv
          /tmp/trino-venv/bin/pip install trino "pyiceberg[pyarrow]" pyarrow

      - name: Verify via PyIceberg REST catalog
        run: |
          /tmp/trino-venv/bin/python3 - <<'EOF'
          from pyiceberg.catalog.rest import RestCatalog
          import pathlib

          expected = int(pathlib.Path("/tmp/ailake-fixture/fixture_rows.txt").read_text().strip())
          catalog = RestCatalog("ailake", uri="http://localhost:8181")

          namespaces = catalog.list_namespaces()
          print(f"namespaces: {namespaces}")
          assert any("default" in str(ns) for ns in namespaces), \
              f"FAIL: 'default' namespace not found in {namespaces}"

          tables = catalog.list_tables("default")
          print(f"tables: {tables}")
          assert any("compat_test" in str(t) for t in tables), \
              f"FAIL: 'compat_test' not found in {tables}"

          table = catalog.load_table("default.compat_test")
          df = table.scan().to_arrow()
          assert len(df) == expected, f"FAIL: PyIceberg REST got {len(df)} rows, expected {expected}"
          print(f"PASS (PyIceberg REST): {len(df)} rows, schema={df.schema.names}")
          EOF

      - name: Verify via Trino
        run: |
          /tmp/trino-venv/bin/python3 - <<'EOF'
          import trino
          import pathlib

          expected = int(pathlib.Path("/tmp/ailake-fixture/fixture_rows.txt").read_text().strip())

          conn = trino.dbapi.connect(
              host="localhost", port=8080, user="ailake",
              catalog="ailake", schema="default",
          )
          cur = conn.cursor()

          cur.execute("SHOW TABLES IN ailake.default")
          tables = [r[0] for r in cur.fetchall()]
          print(f"Trino tables: {tables}")
          assert "compat_test" in tables, f"FAIL: compat_test not found in {tables}"

          cur.execute("SELECT count(*) FROM ailake.default.compat_test")
          count = cur.fetchone()[0]
          assert count == expected, f"FAIL: Trino count {count} != {expected}"

          cur.execute("SELECT MIN(id), MAX(id) FROM ailake.default.compat_test")
          min_id, max_id = cur.fetchone()
          assert min_id == 0, f"FAIL: min id {min_id}"
          assert max_id == expected - 1, f"FAIL: max id {max_id}"

          print(f"PASS (Trino): {count} rows via Iceberg REST catalog, id={min_id}..{max_id}")
          EOF

      - name: Cleanup containers and temp files
        if: always()
        run: |
          docker rm -f iceberg-rest trino 2>/dev/null || true
          docker network rm ailake-net 2>/dev/null || true
          rm -rf /tmp/ailake-fixture /tmp/ailake-trino-catalog

  compat-jvm-plugins:
    name: compat-jvm-plugins
    runs-on: self-hosted
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
      - uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: '8.7'

      - name: Stop Gradle daemons and clear caches
        run: |
          gradle --stop 2>/dev/null || true
          rm -rf ~/.gradle/caches/ ~/.gradle/daemon/

      - name: Build ailake-jni cdylib
        run: cargo build --release -p ailake-jni

      - name: Build fixture
        run: cargo run --example write_fixture -p ailake-query

      - name: Validate C-ABI (Flink/Spark/Trino JNA bridge)
        run: |
          AILAKE_NATIVE_LIB=$(pwd)/target/release/libailake_jni.so \
          AILAKE_SPARK_TRINO_FIXTURE=$(pwd)/spark-trino-fixture \
            python3 tests/compat/check_jni_cabi.py

      - name: Flink JNI integration test
        run: |
          gradle -p ailake-flink test --no-daemon --no-configuration-cache --info \
            -Dailake.native.lib=$(pwd)/target/release/libailake_jni.so

      - name: Spark plugin integration test
        run: |
          LD_LIBRARY_PATH=$(pwd)/target/release \
          AILAKE_SPARK_TRINO_FIXTURE=$(pwd)/spark-trino-fixture \
          AILAKE_LIB_PATH=$(pwd)/target/release \
            gradle -p spark-plugin test --no-daemon --no-configuration-cache

      - name: Trino plugin integration test
        run: |
          LD_LIBRARY_PATH=$(pwd)/target/release \
          AILAKE_SPARK_TRINO_FIXTURE=$(pwd)/spark-trino-fixture \
          AILAKE_LIB_PATH=$(pwd)/target/release \
            gradle -p trino-plugin test --no-daemon --no-configuration-cache

  compat-bigquery:
    name: compat-bigquery
    runs-on: self-hosted
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2

      - name: Pre-cleanup
        run: |
          docker rm -f ailake-bq-emulator 2>/dev/null || true
          docker network rm ailake-bq-net 2>/dev/null || true
          rm -rf /tmp/ailake-bq-fixture

      - name: Build fixture
        env:
          COMPAT_FIXTURE_PATH: /tmp/ailake-bq-fixture
        run: cargo run --example write_fixture -p ailake-query

      - name: Start BigQuery emulator
        run: |
          docker network inspect ailake-bq-net >/dev/null 2>&1 || \
            docker network create ailake-bq-net

          # Random host port — avoids conflicts on shared runners.
          docker run -d --name ailake-bq-emulator \
            --network ailake-bq-net \
            -p 127.0.0.1::9050 \
            ghcr.io/goccy/bigquery-emulator:0.6.6 \
            --project=ailake-test \
            --port=9050

          BQ_PORT=$(docker port ailake-bq-emulator 9050/tcp | grep -oP '(?<=:)\d+$')
          echo "BQ_EMULATOR_PORT=$BQ_PORT" >> "$GITHUB_ENV"
          echo "Started: bq=127.0.0.1:${BQ_PORT}"

      - name: Wait for BigQuery emulator
        run: |
          echo "Waiting for BigQuery emulator on port ${BQ_EMULATOR_PORT}..."
          ready=0
          for i in $(seq 1 30); do
            if curl -s --connect-timeout 2 \
               "http://localhost:${BQ_EMULATOR_PORT}/" > /dev/null 2>&1; then
              echo "BigQuery emulator ready after $((i * 2))s"; ready=1; break
            fi
            sleep 2
          done
          [ "$ready" -eq 1 ] || { echo "ERROR: BigQuery emulator did not become ready"; exit 1; }

      - name: Set up Python venv
        run: |
          rm -rf /tmp/bq-venv
          python3 -m venv /tmp/bq-venv
          /tmp/bq-venv/bin/pip install "google-cloud-bigquery>=3.13" google-auth pyarrow requests

      - name: Verify Parquet compatibility via BigQuery emulator
        timeout-minutes: 10
        run: |
          # -u: unbuffered stdout so logs appear immediately.
          /tmp/bq-venv/bin/python3 -u - <<'EOF'
          import json, os, pathlib, socket, sys, time, uuid
          import requests as http

          # Hard socket timeout — any hung socket call aborts in ≤30 s.
          socket.setdefaulttimeout(30)

          # BIGQUERY_EMULATOR_HOST must be set before importing the client library.
          bq_port = os.environ["BQ_EMULATOR_PORT"]
          os.environ["BIGQUERY_EMULATOR_HOST"] = f"localhost:{bq_port}"
          base_url = f"http://localhost:{bq_port}"

          from google.auth.credentials import AnonymousCredentials
          from google.api_core.client_options import ClientOptions
          from google.cloud import bigquery

          fixture_dir = pathlib.Path("/tmp/ailake-bq-fixture")
          expected = int((fixture_dir / "fixture_rows.txt").read_text().strip())
          parquet_files = [
              p.strip()
              for p in (fixture_dir / "fixture_files.txt").read_text().splitlines()
              if p.strip()
          ]
          print(f"fixture: {expected} rows, files={parquet_files}", flush=True)

          bq = bigquery.Client(
              project="ailake-test",
              credentials=AnonymousCredentials(),
              client_options=ClientOptions(api_endpoint=base_url),
          )
          print("client created", flush=True)

          bq.create_dataset("ailake_compat", exists_ok=True)
          print("dataset ready", flush=True)

          table_ref = bq.dataset("ailake_compat").table("compat_test")

          def load_parquet_multipart(path, write_disposition):
              """
              Upload Parquet to BQ emulator via multipart HTTP POST.
              Bypasses google-resumable-media (resumable upload) which the emulator
              does not implement correctly — the chunk PUT resets the connection.
              The BQ API's uploadType=multipart sends job config + file in a single
              request with no chunking, which the emulator handles correctly.
              """
              with open(path, "rb") as fh:
                  file_bytes = fh.read()

              boundary = f"ailake_{uuid.uuid4().hex}"
              job_resource = {
                  "configuration": {
                      "load": {
                          "destinationTable": {
                              "projectId": "ailake-test",
                              "datasetId": "ailake_compat",
                              "tableId": "compat_test",
                          },
                          "sourceFormat": "PARQUET",
                          "autodetect": True,
                          "writeDisposition": write_disposition,
                      }
                  }
              }
              body = (
                  f"--{boundary}\r\n"
                  f"Content-Type: application/json; charset=UTF-8\r\n\r\n"
                  f"{json.dumps(job_resource)}\r\n"
                  f"--{boundary}\r\n"
                  f"Content-Type: application/octet-stream\r\n\r\n"
              ).encode() + file_bytes + f"\r\n--{boundary}--".encode()

              resp = http.post(
                  f"{base_url}/upload/bigquery/v2/projects/ailake-test/jobs",
                  params={"uploadType": "multipart"},
                  data=body,
                  headers={"Content-Type": f"multipart/related; boundary={boundary}"},
                  timeout=30,
              )
              resp.raise_for_status()
              job_id = resp.json()["jobReference"]["jobId"]
              print(f"  load job {job_id} created", flush=True)

              for _ in range(60):
                  status = http.get(
                      f"{base_url}/bigquery/v2/projects/ailake-test/jobs/{job_id}",
                      timeout=10,
                  ).json()
                  if status["status"]["state"] == "DONE":
                      break
                  time.sleep(1)
              else:
                  raise TimeoutError(f"load job {job_id} did not finish in 60 s")

              if "errorResult" in status["status"]:
                  raise RuntimeError(f"load job failed: {status['status']['errorResult']}")
              print(f"  done", flush=True)

          for i, path in enumerate(parquet_files):
              disp = "WRITE_TRUNCATE" if i == 0 else "WRITE_APPEND"
              print(f"loading file {i+1}/{len(parquet_files)}: {path}", flush=True)
              load_parquet_multipart(path, disp)

          count = next(
              bq.query(
                  "SELECT COUNT(*) FROM `ailake-test.ailake_compat.compat_test`",
              ).result(timeout=30)
          )[0]
          assert count == expected, f"FAIL: BigQuery count {count} != {expected}"

          schema = [f.name for f in bq.get_table(table_ref).schema]
          for col in ("id", "text", "embedding"):
              assert col in schema, f"FAIL: column '{col}' missing from schema {schema}"

          row = list(
              bq.query(
                  "SELECT MIN(id), MAX(id) FROM `ailake-test.ailake_compat.compat_test`",
              ).result(timeout=30)
          )[0]
          assert row[0] == 0, f"FAIL: min id {row[0]}"
          assert row[1] == expected - 1, f"FAIL: max id {row[1]}"

          print(
              f"PASS (BigQuery emulator): {count} rows, schema={schema},"
              f" id={row[0]}..{row[1]}",
              flush=True,
          )
          EOF

      - name: Cleanup
        if: always()
        run: |
          docker rm -f ailake-bq-emulator 2>/dev/null || true
          docker network rm ailake-bq-net 2>/dev/null || true
          rm -rf /tmp/ailake-bq-fixture
