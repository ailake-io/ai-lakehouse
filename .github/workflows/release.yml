name: Release

on:
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always
  CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}

jobs:
  publish:
    name: Publish to crates.io
    runs-on: [self-hosted, Linux, X64]
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
          key: ${{ runner.os }}-cargo-publish-${{ hashFiles('**/Cargo.lock') }}

      # Publish in dependency order (leaf crates first).
      # crates.io needs ~30 s after each publish before dependents can resolve it.

      - name: Publish ailake-core
        run: cargo publish -p ailake-core

      - name: Wait for crates.io index
        run: sleep 30

      - name: Publish ailake-vec
        run: cargo publish -p ailake-vec

      - name: Publish ailake-store
        run: cargo publish -p ailake-store

      - name: Wait for crates.io index
        run: sleep 30

      - name: Publish ailake-parquet
        run: cargo publish -p ailake-parquet

      - name: Publish ailake-index
        run: cargo publish -p ailake-index

      - name: Publish ailake-catalog
        run: cargo publish -p ailake-catalog

      - name: Wait for crates.io index
        run: sleep 30

      - name: Publish ailake-file
        run: cargo publish -p ailake-file

      - name: Wait for crates.io index
        run: sleep 30

      - name: Publish ailake-query
        run: cargo publish -p ailake-query

      - name: Wait for crates.io index
        run: sleep 30

      - name: Publish ailake-jni
        run: cargo publish -p ailake-jni

      - name: Publish ailake-cli
        run: cargo publish -p ailake-cli
