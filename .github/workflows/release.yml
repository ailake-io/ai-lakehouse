name: Release

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      version_override:
        description: "Version to release (e.g. 0.1.0). Leave empty for automatic patch+1."
        required: false
        default: ""

env:
  CARGO_TERM_COLOR: always
  CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: write   # needed to create tags and GitHub Releases
    outputs:
      version: ${{ steps.version.outputs.version }}
      tag: ${{ steps.version.outputs.tag }}
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0  # full history needed to read latest tag
          # main is protected by a ruleset requiring PRs; the default GITHUB_TOKEN
          # pushes as github-actions[bot], which isn't in the ruleset's bypass list.
          # ACTIONS_PAT belongs to a bypass-listed user, so the version-bump commit
          # and release tag can be pushed directly.
          token: ${{ secrets.ACTIONS_PAT }}

      - name: Bump patch version from latest tag
        id: version
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          # Derive next version from latest semver tag (patch+1),
          # or use version_override when explicitly provided.
          LATEST=$(git tag --list 'v*.*.*' --sort=-version:refname | head -1)
          LATEST=${LATEST:-v0.0.0}
          MAJOR=$(echo "${LATEST#v}" | cut -d. -f1)
          MINOR=$(echo "${LATEST#v}" | cut -d. -f2)
          PATCH=$(echo "${LATEST#v}" | cut -d. -f3)
          if [ -n "${{ inputs.version_override }}" ]; then
            NEW_VERSION="${{ inputs.version_override }}"
          else
            NEW_VERSION="$MAJOR.$MINOR.$((PATCH + 1))"
          fi
          NEW_TAG="v$NEW_VERSION"

          # Bump every Cargo.toml (crate versions + inter-crate deps).
          # Quotes ensure we don't partial-match e.g. "0.0.9" inside "0.0.10".
          OLD_VERSION="${LATEST#v}"
          find . -name "Cargo.toml" -not -path "*/target/*" \
            -exec sed -i "s/\"$OLD_VERSION\"/\"$NEW_VERSION\"/g" {} \;

          # Fix internal workspace dep versions regardless of stale value.
          # The sed above only replaces the exact OLD_VERSION; if a workspace dep
          # was added/merged with an outdated version it would be missed.
          for INTERNAL in ailake-core ailake-vec ailake-store ailake-fts ailake-parquet \
                          ailake-index ailake-catalog ailake-file ailake-query ailake-jni \
                          ailake-cli ailake-py; do
            sed -i -E "s/(${INTERNAL}[[:space:]]*=[[:space:]]*\{[^}]*version[[:space:]]*=[[:space:]]*\")[^\"]*/\1${NEW_VERSION}/" Cargo.toml
          done

          # Every other independently-versioned artifact in the monorepo — kept
          # in lockstep with the Rust/PyPI version by explicit project policy
          # (all artifacts share one version number). ailake-py's own
          # pyproject.toml is excluded: it's `dynamic = ["version"]`, sourced
          # from ailake-py/Cargo.toml by maturin, already covered above.
          for GRADLE in spark-plugin/build.gradle.kts trino-plugin/build.gradle.kts \
                        ailake-flink/build.gradle.kts; do
            sed -i "s/^version = \"$OLD_VERSION\"/version = \"$NEW_VERSION\"/" "$GRADLE"
          done
          for CMAKE in duckdb-ailake/CMakeLists.txt ailake-cpp/CMakeLists.txt; do
            sed -i -E "s/(project\([a-zA-Z0-9_-]+ VERSION )$OLD_VERSION/\1$NEW_VERSION/" "$CMAKE"
          done
          for PYPROJECT in airflow-providers-ailake/pyproject.toml \
                          airbyte-destination-ailake/pyproject.toml; do
            sed -i "s/^version = \"$OLD_VERSION\"/version = \"$NEW_VERSION\"/" "$PYPROJECT"
          done

          # Doc-example version placeholders: JVM plugin JAR filenames (the
          # actual JAR name `publish-jvm` produces below is
          # `<plugin>-$NEW_VERSION-plugin.jar`, driven by the build.gradle.kts
          # version just bumped above), the `JAR_VERSION=`/`TAG=v` install-
          # snippet placeholders, the `ailake==X` PyPI pip-install examples, and
          # the `ailake-core/-query/-store = "X"` crates.io dependency examples.
          # CHANGELOG.md is a historical record of each past release and must
          # never be rewritten.
          DOC_FILES=$(grep -rl \
            -e "spark-plugin-$OLD_VERSION-plugin\.jar" \
            -e "trino-plugin-$OLD_VERSION-plugin\.jar" \
            -e "ailake-flink-$OLD_VERSION-plugin\.jar" \
            -e "JAR_VERSION=$OLD_VERSION" \
            -e "TAG=v$OLD_VERSION" \
            -e "ailake==$OLD_VERSION" \
            -e "ailake-core[[:space:]]*=[[:space:]]*\"$OLD_VERSION\"" \
            -e "ailake-query[[:space:]]*=[[:space:]]*\"$OLD_VERSION\"" \
            -e "ailake-store[[:space:]]*=[[:space:]]*\"$OLD_VERSION\"" \
            --include="*.md" . 2>/dev/null | grep -v "CHANGELOG.md" || true)
          for f in $DOC_FILES; do
            sed -i -E \
              -e "s/spark-plugin-$OLD_VERSION-plugin\.jar/spark-plugin-$NEW_VERSION-plugin.jar/g" \
              -e "s/trino-plugin-$OLD_VERSION-plugin\.jar/trino-plugin-$NEW_VERSION-plugin.jar/g" \
              -e "s/ailake-flink-$OLD_VERSION-plugin\.jar/ailake-flink-$NEW_VERSION-plugin.jar/g" \
              -e "s/JAR_VERSION=$OLD_VERSION/JAR_VERSION=$NEW_VERSION/g" \
              -e "s/TAG=v$OLD_VERSION/TAG=v$NEW_VERSION/g" \
              -e "s/ailake==$OLD_VERSION/ailake==$NEW_VERSION/g" \
              -e "s/(ailake-core[[:space:]]*=[[:space:]]*\")$OLD_VERSION(\")/\1$NEW_VERSION\2/g" \
              -e "s/(ailake-query[[:space:]]*=[[:space:]]*\")$OLD_VERSION(\")/\1$NEW_VERSION\2/g" \
              -e "s/(ailake-store[[:space:]]*=[[:space:]]*\")$OLD_VERSION(\")/\1$NEW_VERSION\2/g" \
              "$f"
          done

          # ailake-fts workspace-dependency example — mirrors root Cargo.toml.
          if [ -f docs/architecture/WORKSPACE.md ]; then
            sed -i -E "s/(ailake-fts[[:space:]]*=[[:space:]]*\{ path = \"ailake-fts\", version = \")$OLD_VERSION(\" \})/\1$NEW_VERSION\2/" \
              docs/architecture/WORKSPACE.md
          fi

          git add $(find . -name "Cargo.toml" -not -path "*/target/*") \
            spark-plugin/build.gradle.kts trino-plugin/build.gradle.kts ailake-flink/build.gradle.kts \
            duckdb-ailake/CMakeLists.txt ailake-cpp/CMakeLists.txt \
            airflow-providers-ailake/pyproject.toml airbyte-destination-ailake/pyproject.toml \
            docs/architecture/WORKSPACE.md \
            $DOC_FILES
          git diff --cached --quiet || \
            git commit -m "chore: bump version to $NEW_VERSION [skip ci]"
          git pull --rebase origin main
          git push origin main

          echo "version=$NEW_VERSION" >> "$GITHUB_OUTPUT"
          echo "tag=$NEW_TAG"         >> "$GITHUB_OUTPUT"

      - name: Create and push git tag
        run: |
          TAG="${{ steps.version.outputs.tag }}"
          if git rev-parse "$TAG" >/dev/null 2>&1; then
            echo "Tag $TAG already exists, skipping"
          else
            git tag "$TAG" -m "Release $TAG"
            git push origin "$TAG"
          fi

      - name: Create GitHub Release
        run: |
          TAG="${{ steps.version.outputs.tag }}"
          if gh release view "$TAG" >/dev/null 2>&1; then
            echo "GitHub Release $TAG already exists, skipping"
          else
            gh release create "$TAG" \
              --title "AI-Lake $TAG" \
              --notes "## $TAG

          See [CHANGELOG.md](https://github.com/${{ github.repository }}/blob/main/CHANGELOG.md) for full release notes.

          ### Rust crates (crates.io)
          All crates bumped to \`${{ steps.version.outputs.version }}\`.

          ### Python wheel (PyPI)
          \`ailake\` wheel published to PyPI for x86_64 and aarch64 Linux and Windows x86_64.

          ### Airflow provider (PyPI)
          \`apache-airflow-providers-ailake\` published to PyPI.

          ### JVM plugins
          Spark, Trino, and Flink fat-JARs and \`libailake_jni.so\` attached as release assets.
          " \
              --draft=false
          fi
        env:
          GH_TOKEN: ${{ github.token }}

  sync-develop:
    name: Sync version bump to develop
    needs: release
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
          # Same bypass-listed identity as the main-branch bump commit — develop
          # is also protected by a PR-required ruleset.
          token: ${{ secrets.ACTIONS_PAT }}

      - name: Cherry-pick version-bump commit onto develop
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          TAG="${{ needs.release.outputs.tag }}"
          # The tag is created immediately after the bump commit (before any
          # other commits land on main), so it always points at that exact commit.
          BUMP_SHA=$(git rev-list -n 1 "$TAG")

          git fetch origin develop
          git checkout -B develop origin/develop

          if git cherry-pick "$BUMP_SHA"; then
            git push origin develop
          else
            git cherry-pick --abort
            echo "::error::Version-bump commit $BUMP_SHA (tag $TAG) did not cherry-pick cleanly onto develop — develop is now version-drifted from main. Resolve manually: 'git checkout develop && git cherry-pick $BUMP_SHA', fix conflicts, then push."
            exit 1
          fi

  publish-crates:
    name: Publish to crates.io
    needs: release
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ needs.release.outputs.tag }}

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
          key: ${{ runner.os }}-cargo-publish-${{ hashFiles('**/Cargo.lock') }}

      # Publish in dependency order (leaf crates first).
      # crates.io needs ~30 s after each publish before dependents can resolve it.
      # Exit code 10 = crate version already exists on crates.io — safe to skip.
      - name: Publish all crates
        run: |
          pub() {
            cargo publish -p "$1" || { c=$?; [ $c -eq 10 ] && echo "$1 already published, skipping" || exit $c; }
          }
          pub ailake-core
          sleep 30
          pub ailake-vec
          pub ailake-store
          pub ailake-fts
          sleep 30
          pub ailake-parquet
          pub ailake-index
          pub ailake-catalog
          sleep 30
          pub ailake-file
          sleep 30
          pub ailake-query
          sleep 30
          pub ailake-jni
          pub ailake-cli

  publish-jvm:
    name: Build and upload JVM plugin JARs
    needs: [release, publish-crates]
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: write
    env:
      VERSION: ${{ needs.release.outputs.version }}
      TAG: ${{ needs.release.outputs.tag }}
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ needs.release.outputs.tag }}

      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2

      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: '8.7'

      - name: Build libailake_jni.so
        run: cargo build --release -p ailake-jni

      - name: Build fat-JARs
        run: |
          gradle -p spark-plugin  shadowJar --no-daemon --no-configuration-cache
          gradle -p trino-plugin  shadowJar --no-daemon --no-configuration-cache
          gradle -p ailake-flink  shadowJar --no-daemon --no-configuration-cache

      - name: Upload JVM artifacts to GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release upload "$TAG" \
            spark-plugin/build/libs/spark-plugin-*-plugin.jar \
            trino-plugin/build/libs/trino-plugin-*-plugin.jar \
            ailake-flink/build/libs/ailake-flink-*-plugin.jar \
            target/release/libailake_jni.so \
            --clobber

  publish-airflow:
    name: Build and publish Airflow provider
    needs: [release, publish-jvm]
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: write
    env:
      TAG: ${{ needs.release.outputs.tag }}
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ needs.release.outputs.tag }}

      - uses: actions/setup-python@v5
        with:
          python-version: "3.9"

      - name: Build wheel and sdist
        run: |
          pip install hatchling
          cd airflow-providers-ailake
          python -m hatchling build --target wheel --target sdist

      - name: Publish to PyPI
        env:
          TWINE_USERNAME: __token__
          TWINE_PASSWORD: ${{ secrets.PYPI_API_TOKEN }}
        run: |
          pip install twine
          twine upload --skip-existing airflow-providers-ailake/dist/*

      - name: Upload wheel to GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release upload "$TAG" \
            airflow-providers-ailake/dist/*.whl \
            airflow-providers-ailake/dist/*.tar.gz \
            --clobber

  pypi-linux:
    name: Build Python wheel — Linux (${{ matrix.target }})
    needs: [release, publish-airflow]
    runs-on: ubuntu-latest
    timeout-minutes: 30
    strategy:
      matrix:
        target: [x86_64, aarch64]
      max-parallel: 1
    steps:
      - name: Fix Docker-owned file permissions
        run: |
          docker run --rm -v "$PWD:/work" -w /work alpine sh -c \
            "rm -rf dist/ target/ 2>/dev/null; chown -R $(id -u):$(id -g) . 2>/dev/null; true" || true

      - uses: actions/checkout@v6
        with:
          ref: ${{ needs.release.outputs.tag }}
          clean: false

      - uses: PyO3/maturin-action@v1
        env:
          PYO3_USE_ABI3_FORWARD_COMPATIBILITY: "1"
          CARGO_TARGET_DIR: /tmp/ailake-target-${{ matrix.target }}
          RUNNER_ALLOW_RUNASROOT: "1"
          # ailake-py depends on ailake-catalog's rest-catalog feature (reqwest,
          # rustls-tls -> ring backend), which needs a real C compiler pass for
          # ring's pregenerated ARMv8 assembly (chacha/aes/sha/... .S files).
          # The aarch64 cross-compile toolchain in maturin-action's manylinux
          # Docker image doesn't predefine __ARM_ARCH in its default invocation,
          # and ring's asm_base.h hard-errors without it ("ARM assembler must
          # define __ARM_ARCH") — a known ring/cross-gcc issue, unrelated to any
          # code in this repo. Only matters for aarch64 (native x86_64 gcc
          # predefines its own arch macros correctly); harmless no-op for the
          # x86_64 matrix leg since cc-rs only reads the target-suffixed var
          # matching the crate's actual build target.
          CFLAGS_aarch64_unknown_linux_gnu: "-D__ARM_ARCH=8"
        with:
          target: ${{ matrix.target }}
          manylinux: auto
          before-script-linux: |
            yum install -y perl-core make gcc 2>/dev/null \
              || dnf install -y perl-core make gcc 2>/dev/null \
              || apt-get install -y perl make gcc 2>/dev/null \
              || true
          command: build
          args: --release --out dist --manifest-path ailake-py/Cargo.toml

      - uses: actions/upload-artifact@v4
        with:
          name: wheels-linux-${{ matrix.target }}
          path: dist

  pypi-macos:
    name: Build Python wheel — macOS (${{ matrix.target }})
    needs: [release, pypi-linux]
    runs-on: macos-latest
    timeout-minutes: 30
    strategy:
      matrix:
        target: [x86_64-apple-darwin, aarch64-apple-darwin]
      max-parallel: 1
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ needs.release.outputs.tag }}

      - uses: actions/setup-python@v5
        with:
          python-version: |
            3.9
            3.10
            3.11
            3.12
            3.13

      - uses: PyO3/maturin-action@v1
        env:
          PYO3_USE_ABI3_FORWARD_COMPATIBILITY: "1"
        with:
          target: ${{ matrix.target }}
          command: build
          args: --release --out dist --find-interpreter --manifest-path ailake-py/Cargo.toml

      - uses: actions/upload-artifact@v4
        with:
          name: wheels-macos-${{ matrix.target }}
          path: dist

  pypi-windows:
    name: Build Python wheel — Windows (x86_64)
    needs: [release, pypi-linux]
    runs-on: windows-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ needs.release.outputs.tag }}

      - name: Install Rust (Windows)
        shell: pwsh
        run: |
          if (-not (Get-Command rustup -ErrorAction SilentlyContinue)) {
            $tmp = "$env:TEMP\rustup-init.exe"
            Invoke-WebRequest -Uri 'https://win.rustup.rs/x86_64' -OutFile $tmp
            Start-Process -FilePath $tmp -ArgumentList '-y','--default-toolchain','stable','--target','x86_64-pc-windows-msvc' -Wait -NoNewWindow
            Remove-Item $tmp
          } else {
            rustup toolchain install stable --target x86_64-pc-windows-msvc
            rustup default stable
          }
          "$env:USERPROFILE\.cargo\bin" | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append

      - name: Add Strawberry Perl to PATH
        shell: pwsh
        run: |
          echo "C:\Strawberry\perl\bin" | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append

      - uses: actions/setup-python@v5
        with:
          python-version: "3.9"

      - uses: PyO3/maturin-action@v1
        env:
          PYO3_USE_ABI3_FORWARD_COMPATIBILITY: "1"
          CARGO_TARGET_DIR: C:\t
        with:
          target: x86_64
          command: build
          args: --release --out dist --manifest-path ailake-py/Cargo.toml

      - uses: actions/upload-artifact@v4
        with:
          name: wheels-windows-x86_64
          path: dist

  pypi-sdist:
    name: Build Python sdist
    needs: [release, pypi-linux]
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Fix Docker-owned file permissions
        run: |
          docker run --rm -v "$PWD:/work" -w /work alpine sh -c \
            "rm -rf dist/ 2>/dev/null; chown -R $(id -u):$(id -g) . 2>/dev/null; true" || true

      - uses: actions/checkout@v6
        with:
          ref: ${{ needs.release.outputs.tag }}
          clean: false

      - uses: dtolnay/rust-toolchain@stable

      - uses: actions/setup-python@v5
        with:
          python-version: "3.9"

      - uses: PyO3/maturin-action@v1
        with:
          command: sdist
          args: --out dist --manifest-path ailake-py/Cargo.toml

      - uses: actions/upload-artifact@v4
        with:
          name: wheels-sdist
          path: dist

  pypi-publish:
    name: Publish Python wheel to PyPI
    needs: [release, pypi-linux, pypi-macos, pypi-windows, pypi-sdist]
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      actions: read
      contents: write
    env:
      TAG: ${{ needs.release.outputs.tag }}
    steps:
      - name: Pre-checkout cleanup of root-owned files
        run: |
          docker run --rm -v "$PWD:/work" -w /work alpine sh -c \
            "rm -rf dist dist-raw 2>/dev/null; chown -R $(id -u):$(id -g) . 2>/dev/null; true" || true

      - uses: actions/checkout@v6

      - name: Download wheels
        run: gh run download ${{ github.run_id }} --pattern "wheels-*" --dir dist-raw
        env:
          GH_TOKEN: ${{ github.token }}

      - name: Flatten artifacts into dist/
        run: |
          mkdir -p dist
          find dist-raw -name "*.whl" -o -name "*.tar.gz" | xargs -I{} cp {} dist/
          rm -rf dist-raw

      - uses: actions/setup-python@v5
        with:
          python-version: "3.9"

      - name: Publish to PyPI
        env:
          TWINE_USERNAME: __token__
          TWINE_PASSWORD: ${{ secrets.PYPI_API_TOKEN }}
        run: |
          pip install twine
          twine upload --skip-existing dist/*

      - name: Upload wheels to GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release upload "$TAG" dist/*.whl dist/*.tar.gz --clobber

      - name: Cleanup root-owned dist/
        if: always()
        run: |
          docker run --rm -v "$PWD:/work" -w /work alpine sh -c \
            "rm -rf dist dist-raw 2>/dev/null; chown -R $(id -u):$(id -g) . 2>/dev/null; true" || true
