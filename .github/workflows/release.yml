name: Release

on:
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always
  CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  release:
    name: Create GitHub Release
    runs-on: [self-hosted, Linux, X64]
    permissions:
      contents: write   # needed to create tags and GitHub Releases
    outputs:
      version: ${{ steps.version.outputs.version }}
      tag: ${{ steps.version.outputs.tag }}
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0  # full history so tag push works

      - name: Read version from Cargo.toml
        id: version
        run: |
          VERSION=$(grep '^version' ailake-core/Cargo.toml | head -1 | sed 's/.*"\(.*\)"/\1/')
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "tag=v$VERSION" >> "$GITHUB_OUTPUT"

      - name: Create and push git tag
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag "${{ steps.version.outputs.tag }}" -m "Release ${{ steps.version.outputs.tag }}"
          git push origin "${{ steps.version.outputs.tag }}"

      - name: Create GitHub Release
        run: |
          gh release create "${{ steps.version.outputs.tag }}" \
            --title "AI-Lake ${{ steps.version.outputs.tag }}" \
            --notes "## ${{ steps.version.outputs.tag }}

          See [CHANGELOG.md](https://github.com/${{ github.repository }}/blob/main/CHANGELOG.md) for full release notes.

          ### Rust crates (crates.io)
          All crates bumped to \`${{ steps.version.outputs.version }}\`.

          ### Python wheel
          Published separately via the **Publish Python** workflow — wheel artifacts will be attached to this release after that workflow completes.
          " \
            --draft=false
        env:
          GH_TOKEN: ${{ github.token }}

  publish-crates:
    name: Publish to crates.io
    needs: release
    runs-on: [self-hosted, Linux, X64]
    steps:
      - uses: actions/checkout@v6

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
          key: ${{ runner.os }}-cargo-publish-${{ hashFiles('**/Cargo.lock') }}

      # Publish in dependency order (leaf crates first).
      # crates.io needs ~30 s after each publish before dependents can resolve it.

      - name: Publish ailake-core
        run: cargo publish -p ailake-core

      - name: Wait for crates.io index
        run: sleep 30

      - name: Publish ailake-vec
        run: cargo publish -p ailake-vec

      - name: Publish ailake-store
        run: cargo publish -p ailake-store

      - name: Wait for crates.io index
        run: sleep 30

      - name: Publish ailake-parquet
        run: cargo publish -p ailake-parquet

      - name: Publish ailake-index
        run: cargo publish -p ailake-index

      - name: Publish ailake-catalog
        run: cargo publish -p ailake-catalog

      - name: Wait for crates.io index
        run: sleep 30

      - name: Publish ailake-file
        run: cargo publish -p ailake-file

      - name: Wait for crates.io index
        run: sleep 30

      - name: Publish ailake-query
        run: cargo publish -p ailake-query

      - name: Wait for crates.io index
        run: sleep 30

      - name: Publish ailake-jni
        run: cargo publish -p ailake-jni

      - name: Publish ailake-cli
        run: cargo publish -p ailake-cli

  publish-jvm:
    name: Build and upload JVM plugin JARs
    needs: release
    runs-on: [self-hosted, Linux, X64]
    permissions:
      contents: write
    env:
      VERSION: ${{ needs.release.outputs.version }}
      TAG: ${{ needs.release.outputs.tag }}
    steps:
      - uses: actions/checkout@v6

      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2

      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: '8.7'

      - name: Build libailake_jni.so
        run: cargo build --release -p ailake-jni

      - name: Build fat-JARs
        run: |
          gradle -p spark-plugin  shadowJar --no-daemon --no-configuration-cache
          gradle -p trino-plugin  shadowJar --no-daemon --no-configuration-cache
          gradle -p ailake-flink  shadowJar --no-daemon --no-configuration-cache

      - name: Upload JVM artifacts to GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release upload "$TAG" \
            "spark-plugin/build/libs/spark-plugin-${VERSION}-plugin.jar" \
            "trino-plugin/build/libs/trino-plugin-${VERSION}-plugin.jar" \
            "ailake-flink/build/libs/ailake-flink-${VERSION}-plugin.jar" \
            "target/release/libailake_jni.so" \
            --clobber
