name: Sync Sponsors

on:
  workflow_dispatch:
  schedule:
    - cron: "0 6 * * 1" # weekly, Monday 06:00 UTC

permissions:
  contents: write

jobs:
  sync-sponsors:
    if: github.repository == 'ailake-io/ai-lakehouse'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout main
        uses: actions/checkout@v4
        with:
          ref: main

      # ACTIONS_PAT is reused from release.yml (bypass-listed on main's ruleset,
      # already used to push directly to main). Also needs `read:user` scope for
      # this step's GraphQL sponsors query — if it lacks that scope, add it at
      # github.com/settings/tokens without regenerating the token.
      - name: Update sponsors in README.md
        uses: JamesIves/github-sponsors-readme-action@v1
        with:
          token: ${{ secrets.ACTIONS_PAT }}
          file: "README.md"
          minimum: 0
          active-only: true
          fallback: '<em>Be the first to sponsor this project! → <a href="https://github.com/sponsors/ThiagoLange">github.com/sponsors/ThiagoLange</a></em>'

      - name: Update sponsors in README.pt-BR.md
        uses: JamesIves/github-sponsors-readme-action@v1
        with:
          token: ${{ secrets.ACTIONS_PAT }}
          file: "README.pt-BR.md"
          minimum: 0
          active-only: true
          fallback: '<em>Seja o primeiro a patrocinar este projeto! → <a href="https://github.com/sponsors/ThiagoLange">github.com/sponsors/ThiagoLange</a></em>'

      - name: Commit, open PR, and admin-merge into main
        env:
          GH_TOKEN: ${{ secrets.ACTIONS_PAT }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add README.md README.pt-BR.md
          git diff --staged --quiet && exit 0
          BRANCH="chore/sync-sponsors-$(date +%s)"
          git checkout -b "$BRANCH"
          git commit -m "chore(sponsors): sync sponsors list [skip ci]"
          git push origin "$BRANCH"
          gh pr create --base main --head "$BRANCH" \
            --title "chore(sponsors): sync sponsors list" \
            --body "Automated sponsors list sync."
          gh pr merge "$BRANCH" --squash --admin \
            --subject "chore(sponsors): sync sponsors list [skip ci]"
