name: CI GPU Data (ailake-index — CUDA/ROCm data integration)

on:
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  # ── Windows self-hosted (bare-metal CUDA or ROCm) ──────────────────────────
  #
  # Runs gpu_data integration tests: real cuBLAS/hipBLAS SGEMM kernels against
  # synthetic datasets (2 000–5 000 vectors, dim 64–128), asserts ≥99% recall
  # vs CPU brute-force ground truth.
  #
  # Runner requirements:
  #   NVIDIA: CUDA Toolkit 11 or 12 (cudart64_*.dll + cublas64_*.dll in PATH)
  #   AMD:    ROCm for Windows (amdhip64.dll + hipblas.dll in PATH)
  #   Rust stable toolchain (rustup)
  index-gpu-data-windows:
    name: index — gpu data (Windows)
    runs-on: [self-hosted, Windows, X64]
    steps:
      - uses: actions/checkout@v6

      - name: Locate Rust
        uses: ./.github/actions/locate-rust-windows

      - uses: Swatinem/rust-cache@v2

      - name: Detect GPU backend
        shell: pwsh
        run: |
          function Find-Dll([string]$name) {
            ($env:PATH -split ';') | ForEach-Object {
              $p = Join-Path $_ $name
              if (Test-Path $p) { $p }
            } | Select-Object -First 1
          }
          $cuda = Find-Dll "cudart64_12.dll"
          if (-not $cuda) { $cuda = Find-Dll "cudart64_11.dll" }
          $rocm = Find-Dll "amdhip64.dll"
          if ($cuda) {
            Write-Host "NVIDIA CUDA runtime found: $cuda"
            echo "AILAKE_GPU_BACKEND=cuda" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
          } elseif ($rocm) {
            Write-Host "AMD ROCm runtime found: $rocm"
            echo "AILAKE_GPU_BACKEND=rocm" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
          } else {
            Write-Host "WARNING: no CUDA or ROCm runtime found — tests will print skip messages"
            echo "AILAKE_GPU_BACKEND=none" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
          }

      - name: Run GPU data integration tests
        shell: pwsh
        run: cargo test -p ailake-index --test gpu_data -- --nocapture

  # ── Linux self-hosted — NVIDIA (Docker + nvidia-container-toolkit) ─────────
  #
  # Runner label: gpu-nvidia
  # Disabled: no Linux GPU runner available yet. Remove `if: false` when registered.
  index-gpu-data-linux-cuda:
    name: index — gpu data (Linux/CUDA Docker)
    if: false
    runs-on: [self-hosted, Linux, X64, gpu-nvidia]
    steps:
      - uses: actions/checkout@v6

      - name: Build CUDA test image
        run: |
          docker build \
            --file docker/gpu-cuda/Dockerfile \
            --tag ailake-gpu-cuda:ci-data-${{ github.sha }} \
            .

      - name: Run GPU data integration tests in CUDA container
        run: |
          docker run --rm \
            --gpus all \
            -e AILAKE_GPU_BACKEND=cuda \
            -e RUST_BACKTRACE=1 \
            ailake-gpu-cuda:ci-data-${{ github.sha }} \
            cargo test -p ailake-index --test gpu_data -- --nocapture

      - name: Remove CI image
        if: always()
        run: docker rmi ailake-gpu-cuda:ci-data-${{ github.sha }} || true

  # ── Linux self-hosted — AMD (Docker + ROCm device passthrough) ────────────
  #
  # Runner label: gpu-amd
  # Disabled: no Linux GPU runner available yet. Remove `if: false` when registered.
  index-gpu-data-linux-rocm:
    name: index — gpu data (Linux/ROCm Docker)
    if: false
    runs-on: [self-hosted, Linux, X64, gpu-amd]
    steps:
      - uses: actions/checkout@v6

      - name: Build ROCm test image
        run: |
          docker build \
            --file docker/gpu-rocm/Dockerfile \
            --tag ailake-gpu-rocm:ci-data-${{ github.sha }} \
            .

      - name: Run GPU data integration tests in ROCm container
        run: |
          docker run --rm \
            --device /dev/kfd --device /dev/dri \
            --group-add video \
            -e AILAKE_GPU_BACKEND=rocm \
            -e RUST_BACKTRACE=1 \
            ailake-gpu-rocm:ci-data-${{ github.sha }} \
            cargo test -p ailake-index --test gpu_data -- --nocapture

      - name: Remove CI image
        if: always()
        run: docker rmi ailake-gpu-rocm:ci-data-${{ github.sha }} || true
