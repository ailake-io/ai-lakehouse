name: Publish JVM Plugins

on:
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag to attach JARs to (e.g. v0.1.0). Leave empty to derive from Cargo.toml."
        required: false
  workflow_run:
    workflows: ["Release"]
    types: [completed]
    branches: [main]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  guard:
    name: Guard — release must have succeeded
    runs-on: [self-hosted, Linux, X64]
    if: >
      github.event_name == 'workflow_dispatch' ||
      (github.event_name == 'workflow_run' && github.event.workflow_run.conclusion == 'success')
    steps:
      - name: Release workflow status
        run: |
          if [ "${{ github.event_name }}" = "workflow_run" ]; then
            echo "Triggered by Release workflow — conclusion: ${{ github.event.workflow_run.conclusion }}"
          else
            echo "Triggered manually via workflow_dispatch"
          fi

  publish-jvm:
    name: Build and upload JVM plugin JARs
    needs: guard
    runs-on: [self-hosted, Linux, X64]
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6

      - name: Resolve version and tag
        id: version
        run: |
          VERSION=$(grep '^version' ailake-core/Cargo.toml | head -1 | sed 's/.*"\(.*\)"/\1/')
          TAG="${{ github.event.inputs.tag }}"
          [ -z "$TAG" ] && TAG="v$VERSION"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"

      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2

      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: '8.7'

      - name: Build libailake_jni.so
        run: cargo build --release -p ailake-jni

      - name: Build fat-JARs
        run: |
          gradle -p spark-plugin  shadowJar --no-daemon --no-configuration-cache
          gradle -p trino-plugin  shadowJar --no-daemon --no-configuration-cache
          gradle -p ailake-flink  shadowJar --no-daemon --no-configuration-cache

      - name: Upload JVM artifacts to GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          TAG="${{ steps.version.outputs.tag }}"
          gh release upload "$TAG" \
            "spark-plugin/build/libs/spark-plugin-${VERSION}-plugin.jar" \
            "trino-plugin/build/libs/trino-plugin-${VERSION}-plugin.jar" \
            "ailake-flink/build/libs/ailake-flink-${VERSION}-plugin.jar" \
            "target/release/libailake_jni.so" \
            --clobber
