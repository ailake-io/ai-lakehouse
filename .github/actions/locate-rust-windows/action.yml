name: Locate Rust (Windows self-hosted)
description: >
  Finds the cargo binary on a Windows self-hosted runner and adds it to PATH.
  Search order: (1) real toolchain binary inside .rustup/toolchains/, (2) rustup
  shim at .cargo/bin/, (3) already on PATH. Fails the step if cargo is not found.

runs:
  using: composite
  steps:
    - name: Find and add cargo to PATH
      shell: pwsh
      run: |
        $rustBin = $null

        # 1. Prefer the actual toolchain binary (works without rustup shim resolution)
        $toolchainCargo = Get-ChildItem `
          "$env:USERPROFILE\.rustup\toolchains\*\bin\cargo.exe", `
          "C:\Users\$env:USERNAME\.rustup\toolchains\*\bin\cargo.exe" `
          -ErrorAction SilentlyContinue | Select-Object -First 1
        if ($toolchainCargo) {
          $rustBin = Split-Path $toolchainCargo.FullName
          Write-Host "locate-rust: toolchain binary at $rustBin"
        }

        # 2. Rustup shim (only works if rustup is in PATH)
        if (-not $rustBin) {
          foreach ($c in @("$env:USERPROFILE\.cargo\bin", "C:\Users\$env:USERNAME\.cargo\bin")) {
            if (Test-Path "$c\cargo.exe") { $rustBin = $c; break }
          }
          if ($rustBin) { Write-Host "locate-rust: shim at $rustBin" }
        }

        # 3. Already on PATH
        if (-not $rustBin) {
          $r = Get-Command cargo -ErrorAction SilentlyContinue
          if ($r) { $rustBin = Split-Path $r.Source; Write-Host "locate-rust: cargo already on PATH at $rustBin" }
        }

        if (-not $rustBin) {
          Write-Error "locate-rust: cargo not found. Install Rust stable on this runner (https://rustup.rs)."
          exit 1
        }

        "$rustBin" | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append
        Write-Host "locate-rust: added $rustBin to GITHUB_PATH"
