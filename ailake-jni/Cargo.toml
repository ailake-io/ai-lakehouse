[package]
name = "ailake-jni"
version = "0.1.0"
edition = "2021"

[lib]
crate-type = ["cdylib"]

[dependencies]
ailake-query   = { path = "../ailake-query" }
ailake-catalog = { path = "../ailake-catalog" }
ailake-store   = { path = "../ailake-store" }
ailake-core    = { path = "../ailake-core" }
uniffi         = { version = "0.27", features = ["scaffolding-ffi-buffer-fns"] }
tokio          = { workspace = true }
serde          = { workspace = true }
serde_json     = { workspace = true }
arrow-array    = { workspace = true }
arrow-schema   = { workspace = true }
